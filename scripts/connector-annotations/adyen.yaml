# Adyen Connector Annotations
# Contains only connector-specific notes, required fields, credentials, and test data.
# Sample payloads come exclusively from probe data (data/field_probe/adyen.json).
# Run: python3 scripts/generate-connector-docs.py adyen

display_name: Adyen

overview: |
  Adyen is a global payment platform supporting 250+ payment methods across 40+ currencies.
  It operates at PCI DSS Level 1 and supports advanced fraud detection via RevenueProtect.

  | Attribute | Value |
  |-----------|-------|
  | Connector ID | `ADYEN` |
  | Regions | Global |
  | Currencies | 40+ |
  | API | Adyen Checkout API v69+ |
  | Amount Format | Minor units (cents) |

credentials:
  - name: api_key
    description: Adyen API Key (`AQE...`)
  - name: merchant_account
    description: Adyen Merchant Account name (e.g. `YourCompanyECOM`)
  - name: hmac_key
    description: HMAC key for webhook notification verification

flows:
  Authorize:
    notes:
      - >
        For Klarna (`KlarnaRedirect`), `customer.id` is required as the Adyen shopper
        reference. Omitting it returns `MissingRequiredField: customer_id`.
      - >
        For Affirm, `address.billing_address.email`, full name, phone number, and complete
        billing address are all required.
      - >
        For Bancontact card, `card_number`, `card_exp_month`, and `card_exp_year` are required
        within the `payment_method.bancontact_card` object.
      - >
        For Blik, a 6-digit `blik_code` is required.
      - >
        For EPS, `bank_name` is required to identify the issuing bank.
      - >
        `return_url` is required for all redirect-based methods (bank redirects, BNPL, wallets).
    required_fields:
      - field: customer.id
        note: Required for Klarna and all recurring/MIT payments (used as Adyen shopperReference)
      - field: address.billing_address.email
        note: Required for Affirm
      - field: address.billing_address
        note: Required for Affirm (full address including phone and name)
      - field: blik_code
        note: Required for Blik (6-digit one-time code from customer's banking app)
      - field: bank_name
        note: Required for EPS
      - field: bancontact_card.card_number
        note: Required for Bancontact Card
      - field: bancontact_card.card_exp_month
        note: Required for Bancontact Card
      - field: bancontact_card.card_exp_year
        note: Required for Bancontact Card

  SetupMandate:
    notes:
      - Creates an Adyen recurring contract. `customer.id` is required as the shopper reference.
      - >
        `setup_future_usage` should be `OFF_SESSION` for MIT mandates or `ON_SESSION`
        for CIT (customer-initiated recurring).
    required_fields:
      - field: customer.id
        note: Required — used as Adyen `shopperReference`

  RepeatPayment:
    notes:
      - >
        MIT charge. `customer.id` must match the shopper reference used in `SetupMandate`.
    required_fields:
      - field: customer.id
        note: Required — must match the shopper reference used in SetupMandate

  Accept:
    notes:
      - Accepts (concedes) the Adyen dispute.

  SubmitEvidence:
    notes:
      - Uploads counter-evidence to Adyen's Defense system. Documents should be base64-encoded.

  DefendDispute:
    notes:
      - Submits a formal defense for the Adyen dispute.

