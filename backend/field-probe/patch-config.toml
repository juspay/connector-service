# Field-patch rules for all flows.
#
# ── Authorize (grouped by proto parent) ──────────────────────────────────────
# Parent is the section name; key is the struct field name.
# type options:
#   secret_string            — Secret<String>
#   string                   — plain String
#   bool                     — boolean
#   i32                      — integer (parsed from value)
#   country_us               — CountryAlpha2::Us  (no value needed)
#   future_usage_off_session — FutureUsage::OffSession (no value needed)
# [[multi]] entries handle cases where one error name must set several fields.
#
# ── Other flows ([capture], [refund], [void], [get], [setup_recurring]) ──────
# Key is a logical name; `field` is the actual struct field to set.
# Additional type options for these flows:
#   usd_money         — sets amount field to usd_money(1000)  (no value needed)
#   full_browser_info — populates browser_info with probe defaults (no value needed)

# ── billing_address ───────────────────────────────────────────────────────────

[billing_address]
country_alpha2_code = { aliases = [
  "billing_address.country", "billing_address.country_code",
  "address.country", "address.country_code",
  "payment_method_data.billing.address.country",
], type = "country_us" }

city = { aliases = [
  "billing_address.city", "address.city",
], type = "secret_string", value = "Seattle" }

zip_code = { aliases = [
  "billing_address.zip", "billing_address.postal_code", "billing_address.zip_code",
  "address.zip", "address.postal_code",
], type = "secret_string", value = "98101" }

state = { aliases = [
  "billing_address.state", "address.state",
], type = "secret_string", value = "WA" }

line1 = { aliases = [
  "billing_address.line1", "address.line1",
], type = "secret_string", value = "123 Main St" }

first_name = { aliases = [
  "billing_address.first_name", "address.first_name",
  "payment_method_data.billing.address.first_name",
], type = "secret_string", value = "John" }

last_name = { aliases = [
  "billing_address.last_name", "address.last_name",
], type = "secret_string", value = "Doe" }

email = { aliases = [
  "billing_address.email", "billing_email",
  "payment_method_data.billing.email",
], type = "secret_string", value = "test@example.com" }

# ── shipping_address ──────────────────────────────────────────────────────────

[shipping_address]
country_alpha2_code = { aliases = [
  "shipping_address.country", "shipping_address.country_code",
  "shipping.address.country",
], type = "country_us" }

city = { aliases = [
  "shipping_address.city", "shipping.address.city",
], type = "secret_string", value = "Seattle" }

zip_code = { aliases = [
  "shipping_address.zip", "shipping_address.postal_code",
  "shipping.address.zip", "shipping.address.postal_code",
], type = "secret_string", value = "98101" }

state = { aliases = [
  "shipping_address.state", "shipping.address.state",
], type = "secret_string", value = "WA" }

line1 = { aliases = [
  "shipping_address.line1", "shipping.address.line1",
], type = "secret_string", value = "123 Main St" }

first_name = { aliases = [
  "shipping_address.first_name", "shipping.address.first_name",
], type = "secret_string", value = "John" }

last_name = { aliases = [
  "shipping_address.last_name", "shipping.address.last_name",
], type = "secret_string", value = "Doe" }

# ── browser_info ──────────────────────────────────────────────────────────────

[browser_info]
accept_header          = { aliases = ["browser_info.accept_header"],                                               type = "string", value = "application/json" }
user_agent             = { aliases = ["browser_info.user_agent"],                                                  type = "string", value = "Mozilla/5.0 (probe-bot)" }
ip_address             = { aliases = ["browser_info.ip_address", "ip_address", "online", "online.ip_address", "IP address"], type = "string", value = "1.2.3.4" }
language               = { aliases = ["browser_info.language"],                                                    type = "string", value = "en-US" }
java_script_enabled    = { aliases = ["browser_info.java_script_enabled"],                                         type = "bool",   value = "true" }
color_depth            = { aliases = ["browser_info.color_depth"],                                                 type = "i32",    value = "24" }
screen_height          = { aliases = ["browser_info.screen_height"],                                               type = "i32",    value = "900" }
screen_width           = { aliases = ["browser_info.screen_width"],                                                type = "i32",    value = "1440" }
time_zone_offset_minutes = { aliases = ["browser_info.time_zone", "browser_info.time_zone_offset_minutes"],        type = "i32",    value = "-480" }

# ── customer ──────────────────────────────────────────────────────────────────

[customer]
email                 = { aliases = ["customer.email", "email"],            type = "secret_string", value = "test@example.com" }
name                  = { aliases = ["customer.name", "customer_name", "company_name"], type = "string", value = "John Doe" }
connector_customer_id = { aliases = ["customer_id", "customer.id"],         type = "string",        value = "cust_probe_123" }

# ── top_level ─────────────────────────────────────────────────────────────────

[top_level]
return_url               = { aliases = ["return_url", "router_return_url"],                          type = "string",                  value = "https://example.com/return" }
webhook_url              = { aliases = ["webhook_url"],                                               type = "string",                  value = "https://example.com/webhook" }
complete_authorize_url   = { aliases = ["complete_authorize_url", "continue_redirection_url"],      type = "string",                  value = "https://example.com/complete" }
merchant_order_id        = { aliases = ["merchant_order_id", "reference_id", "order_id", "order_id (reference_id)", "reference_id (order_id)", "reference_id (payme_sale_id from CreateOrder)"],  type = "string", value = "probe_order_001" }
description              = { aliases = ["description"],                                               type = "string",                  value = "Probe payment" }
statement_descriptor_name = { aliases = ["statement_descriptor_name", "statement_descriptor"],       type = "string",                  value = "Probe" }
payment_method_token     = { aliases = ["payment_method_token", "payment_method_token (from PaymentMethodToken flow) or connector_mandate_id (for saved payment methods)", "payment_method_token (source) - Call CreateConnectorCustomer and PaymentMethodToken first, or ensure connector_customer_id is set"], type = "secret_string", value = "probe_pm_token" }
order_category           = { aliases = ["order_category", "order_category in metadata"],              type = "string",                  value = "mobile" }
setup_future_usage       = { aliases = ["setup_future_usage"],                                        type = "future_usage_off_session" }

# ── multi-field patches ───────────────────────────────────────────────────────
# Use [[multi]] when one error name must set several fields at once.

# Billing full name — ACI "card_holder_name", Airwallex "shopper_name",
# Shift4 "cardholder_name", Nuvei combined-name variants, and other connector-specific strings.
[[multi]]
aliases = [
  "billing_address.name",
  "billing_address.first_name and billing_address.last_name",
  "billing_address.first_name and billing_address.last_name or customer_name",
  "shopper_name", "card_holder_name", "cardholder_name",
]
actions = [
  { parent = "billing_address", field = "first_name", type = "secret_string", value = "John" },
  { parent = "billing_address", field = "last_name",  type = "secret_string", value = "Doe"  },
]

# Bambora: reads billing full name OR customer_name — satisfy both.
[[multi]]
aliases = ["billing.first_name or customer_name"]
actions = [
  { parent = "billing_address", field = "first_name", type = "secret_string", value = "John"     },
  { parent = "billing_address", field = "last_name",  type = "secret_string", value = "Doe"      },
  { parent = "customer",        field = "name",       type = "string",        value = "John Doe" },
]

# Billing phone — Razorpay "contact", generic billing.phone variants.
[[multi]]
aliases = ["billing_address.phone", "payment_method_data.billing.phone", "contact"]
actions = [
  { parent = "billing_address", field = "phone_number",       type = "secret_string", value = "4155552671" },
  { parent = "billing_address", field = "phone_country_code", type = "string",        value = "+1"         },
]

# Customer phone.
[[multi]]
aliases = ["customer.phone"]
actions = [
  { parent = "customer", field = "phone_number",       type = "string", value = "4155552671" },
  { parent = "customer", field = "phone_country_code", type = "string", value = "+1"         },
]

# ── capture ───────────────────────────────────────────────────────────────────

[capture]
amount        = { field = "amount_to_capture",     aliases = ["amount", "currency"],                                                                                type = "usd_money" }
browser_info  = { field = "browser_info",           aliases = ["browser_info", "browser_info.ip_address", "ip_address"],                                            type = "full_browser_info" }
meta_desc     = { field = "metadata",               aliases = ["description"],                                                                                       type = "secret_string", value = '{"description":"Probe payment","reference_id":"probe_ref_001"}' }
meta_conn     = { field = "metadata",               aliases = ["connector_meta_data", "connector_metadata", "connector_request_id", "connector_transaction_id", "connector_request_id (NUMTRANS)"],     type = "secret_string", value = '{"reference_id":"probe_ref_001","connector_request_id":"probe_req_001","transaction_id":"probe_txn_001"}' }
connector_fd  = { field = "connector_feature_data", aliases = ["connector_feature_data"],                                                                            type = "secret_string", value = "{}" }

# ── refund ────────────────────────────────────────────────────────────────────

[refund]
amount        = { field = "refund_amount",          aliases = ["amount", "currency"],                                                         type = "usd_money" }
webhook_url   = { field = "webhook_url",             aliases = ["webhook_url"],                                                                type = "string",        value = "https://example.com/webhook" }
description   = { field = "reason",                  aliases = ["description"],                                                                type = "string",        value = "customer_request" }
customer_id   = { field = "customer_id",             aliases = ["customer_id"],                                                                type = "string",        value = "probe_customer_001" }
meta_conn     = { field = "metadata",                aliases = ["connector_meta_data", "connector_metadata"],                                  type = "secret_string", value = '{"reference_id":"probe_ref_001","connector_request_id":"probe_req_001","transaction_id":"probe_txn_001"}' }
connector_fd  = { field = "connector_feature_data",  aliases = ["connector_feature_data"],                                                    type = "secret_string", value = "{}" }

# ── void ──────────────────────────────────────────────────────────────────────

[void]
amount         = { field = "amount",                  aliases = ["amount", "Amount", "amount for void operation", "currency"],  type = "usd_money" }
browser_info   = { field = "browser_info",             aliases = ["browser_info", "browser_info.ip_address"],                   type = "full_browser_info" }
cancel_reason  = { field = "cancellation_reason",      aliases = ["cancellation_reason", "Cancellation Reason"],                type = "string",        value = "requested_by_customer" }
meta_conn      = { field = "metadata",                 aliases = ["connector_meta_data", "connector_metadata", "connector_request_id"],  type = "secret_string", value = '{"reference_id":"probe_ref_001","connector_request_id":"probe_req_001","transaction_id":"probe_txn_001"}' }
connector_fd   = { field = "connector_feature_data",   aliases = ["connector_feature_data"],                                    type = "secret_string", value = "{}" }

# ── get (psync) ───────────────────────────────────────────────────────────────

[get]
ref_id        = { field = "connector_order_reference_id", aliases = ["reference_id", "connector_order_reference_id"],                                   type = "string",        value = "probe_order_ref_001" }
meta_conn     = { field = "metadata",                     aliases = ["connector_meta_data", "connector_metadata", "connector_request_id", "connector_request_id (NUMTRANS)"],  type = "secret_string", value = '{"reference_id":"probe_ref_001","connector_request_id":"probe_req_001","transaction_id":"probe_txn_001"}' }
connector_fd  = { field = "connector_feature_data",       aliases = ["connector_feature_data"],                                                          type = "secret_string", value = "{}" }

# ── setup_recurring ───────────────────────────────────────────────────────────

[setup_recurring]
meta_conn      = { field = "metadata",        aliases = ["connector_feature_data", "connector_meta_data"],              type = "secret_string", value = "{}" }
webhook_url    = { field = "webhook_url",     aliases = ["webhook_url"],                                                type = "string",        value = "https://example.com/webhook" }
order_category      = { field = "order_category", aliases = ["order_category"],                     type = "string",        value = "mobile" }
order_category_meta = { field = "metadata",       aliases = ["order_category in metadata"],           type = "secret_string", value = '{"order_category":"mobile"}' }
session_token       = { field = "session_token",  aliases = ["session_token"],                        type = "string",        value = "probe_session_token" }

# ── recurring_charge ──────────────────────────────────────────────────────────

[recurring_charge]
email        = { field = "email",                aliases = ["email", "customer.email", "payment_method_data.billing.email"],  type = "secret_string", value = "test@example.com" }
description  = { field = "description",          aliases = ["description"],                                                    type = "string",        value = "Probe payment" }
webhook_url  = { field = "webhook_url",           aliases = ["webhook_url"],                                                    type = "string",        value = "https://example.com/webhook" }
return_url   = { field = "return_url",            aliases = ["return_url", "router_return_url"],                               type = "string",        value = "https://example.com/return" }
browser_info = { field = "browser_info",          aliases = ["browser_info", "browser_info.ip_address"],                       type = "full_browser_info" }
meta_conn    = { field = "metadata",              aliases = ["connector_meta_data", "connector_metadata", "connector_request_id"], type = "secret_string", value = '{"reference_id":"probe_ref_001","connector_request_id":"probe_req_001","transaction_id":"probe_txn_001"}' }
connector_fd = { field = "connector_feature_data", aliases = ["connector_feature_data"],                                       type = "secret_string", value = "{}" }
