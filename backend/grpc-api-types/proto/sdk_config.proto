// Package: ucs.v2
// File: sdk_config.proto
//
// Overview:
//   Configuration options for the Connector SDK.
//   - HttpConfig: Used by SDK to control HTTP request behavior
//   - ClientConfig: Used for SDK initialization
//   - RequestOptions: Used for per-request overrides
//   - FfiOptions: Internal context for UniFFI transformation engine

syntax = "proto3";

package ucs.v2;

import "payment.proto";

option go_package = "github.com/juspay/connector-service/backend/grpc-api-types/proto;proto";

// ============================================================
// ENUMERATIONS
// ============================================================

// Deployment environment for the SDK.
// This determines which backend configuration (URLs, credentials, etc.) is used.
enum Environment {
  ENVIRONMENT_UNSPECIFIED = 0;
  
  // Sandbox/Testing environment
  SANDBOX = 1;
  
  // Production environment
  PRODUCTION = 2;
}

// ============================================================
// SDK Configuration (User-facing)
// ============================================================

// Initialization configuration for the ConnectorClient
message ClientConfig {
  // The connector to use for all requests from this client
  Connector connector = 1;

  // The environment to use (Sandbox/Production)
  Environment environment = 2;

  // Optional default authentication for the connector
  optional ConnectorAuth auth = 3;

  // HTTP and transport configuration
  optional HttpConfig http = 4;
}

// Per-request configuration overrides
message RequestOptions {
  // Override authentication for this specific request (useful for multi-tenancy)
  optional ConnectorAuth auth = 1;

  // Override HTTP timeouts for this specific request
  optional HttpTimeoutConfig timeouts = 2;
}

// ============================================================
// Transport Configuration (SDK-side)
// ============================================================

// HTTP timeout configuration
message HttpTimeoutConfig {
  // Total timeout for entire request lifecycle (milliseconds)
  optional uint32 total_timeout_ms = 1;

  // Connection timeout (milliseconds)
  optional uint32 connect_timeout_ms = 2;

  // Response/Read timeout (milliseconds)
  optional uint32 response_timeout_ms = 3;

  // Keep-alive timeout for pooled connections (milliseconds)
  optional uint32 keep_alive_timeout_ms = 4;
}

// HTTP client configuration options (Infrastructure level)
message HttpConfig {
  // Timeouts configuration
  optional HttpTimeoutConfig timeouts = 1;

  // Proxy configuration
  optional ProxyOptions proxy = 2;

  // CA certificate for pinning.
  // Supports both binary DER and text-based PEM formats.
  optional CaCert ca_cert = 3;
}

// CA certificate message wrapper
message CaCert {
  oneof format {
    // Binary DER-encoded certificate data
    bytes der = 1;
    // Text-based PEM-encoded certificate string (starts with -----BEGIN CERTIFICATE-----)
    string pem = 2;
  }
}

// Proxy configuration
message ProxyOptions {
  // HTTP proxy URL
  optional string http_url = 1;

  // HTTPS proxy URL
  optional string https_url = 2;

  // URLs/Hostnames that should bypass the proxy
  repeated string bypass_urls = 3;
}

// ============================================================
// FFI Options (Internal Boundary)
// ============================================================

// Internal context passed across the FFI boundary to the UCS core.
message FfiOptions {
  // Required: Rust must know which environment (.toml) to use for config lookup
  Environment environment = 1;

  // Required: Rust must know which connector logic to execute
  Connector connector = 2;

  // Required: Credentials needed to build auth headers/payloads
  optional ConnectorAuth auth = 3;
}

// Root configuration message to ensure all types are included in code generation.
message Config {
  ClientConfig client = 1;
  RequestOptions request = 2;
  FfiOptions ffi = 3;
}

// ============================================================
// Constants
// ============================================================

// Global defaults for the SDK transport layer
enum HttpDefault {
  HTTP_DEFAULT_UNSPECIFIED = 0;
  
  // Timeouts in milliseconds
  TOTAL_TIMEOUT_MS = 45000;
  CONNECT_TIMEOUT_MS = 10000;
  RESPONSE_TIMEOUT_MS = 30000;
  KEEP_ALIVE_TIMEOUT_MS = 60000;
}

// ============================================================
// Internal FFI Records (UniFFI Bridge)
// ============================================================

// Binary-safe structure for passing HTTP requests from Rust to SDKs
message FfiConnectorHttpRequest {
  string url = 1;
  string method = 2;
  map<string, string> headers = 3;
  optional bytes body = 4;
}

// Binary-safe structure for passing HTTP responses from SDKs back to Rust
message FfiConnectorHttpResponse {
  uint32 status_code = 1;
  map<string, string> headers = 2;
  bytes body = 3;
}
