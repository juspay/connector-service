syntax = "proto3";

package ucs.v2;

import "payment.proto";
import "payment_methods.proto";

option go_package = "github.com/juspay/connector-service/backend/grpc-api-types/proto;proto";

// Request message for composite authorize flow.
message CompositeAuthorizeRequest {
  // Payment Identification
  Identifier request_ref_id = 1; // Reference ID for tracking

  // Account-Specific Configuration
  optional SecretString merchant_account_metadata = 2; // Account-level configuration metadata (e.g., merchant_name, brand_id)

  // Metadata
  optional SecretString metadata = 3; // Additional metadata for the connector
  optional SecretString connector_metadata = 4; // Connector-specific metadata for the transaction

  // Environment Configuration
  optional bool test_mode = 5; // A boolean value to indicate if the connector is in Test mode

  // Customer Information
  optional string customer_name = 6; // Name of the customer
  optional SecretString email = 7; // Email address of the customer
  optional string customer_id = 8; // Merchant's customer ID
  optional string phone_number = 9; // Phone number of the customer

  // Address Information
  optional PaymentAddress address = 10; // Billing and shipping address details

  // Amount Information
  int64 amount = 11; // The amount for the payment in major currency units
  Currency currency = 12; // The currency for the payment, in ISO 4217 three-letter code
  int64 minor_amount = 13; // The minor amount for the payment (e.g., cents)
  optional int64 order_tax_amount = 14; // Tax amount for the order
  optional int64 shipping_cost = 15; // Cost of shipping for the order

  // Payment Method and Capture Settings
  PaymentMethod payment_method = 16; // Payment method to be used
  optional CaptureMethod capture_method = 17; // Method for capturing the payment
  optional string connector_customer_id = 18; // Customer ID as recognized by the connector

  // Authentication Details
  AuthenticationType auth_type = 19; // Type of authentication to be used
  optional bool enrolled_for_3ds = 20; // Indicates if the customer is enrolled for 3D Secure
  optional AuthenticationData authentication_data = 21; // Additional authentication data

  // URLs for Redirection and Webhooks
  optional string return_url = 22; // URL to redirect after payment
  optional string webhook_url = 23; // URL for webhook notifications
  optional string complete_authorize_url = 24; // URL to complete authorization

  // Session and Token Information
  optional string session_token = 25; // Session token, if applicable

  // Order Details
  optional string order_category = 26; // Category of the order
  optional string merchant_order_reference_id = 27; // Merchant's internal reference ID
  optional string connector_order_reference_id = 28; // Connector's reference id for order

  // Behavioral Flags and Preferences
  optional FutureUsage setup_future_usage = 29; // Indicates future usage intention
  optional bool off_session = 30; // Indicates if off-session transaction
  optional bool request_incremental_authorization = 31; // Indicates if incremental authorization is requested
  optional bool request_extended_authorization = 32; // Indicates if extended authorization is requested
  optional bool enable_partial_authorization = 33; // Indicates if partial authorization is enabled

  // Contextual Information
  optional CustomerAcceptance customer_acceptance = 34; // Details of customer acceptance
  optional BrowserInformation browser_info = 35; // Information about the customer's browser
  optional PaymentExperience payment_experience = 36; // Preferred payment experience
  optional string description = 37; // Additional description for the payment
  optional PaymentChannel payment_channel = 38; // Describes the channel through which the payment was initiated

  // Mandate Setup Details
  optional SetupMandateDetails setup_mandate_details = 39; // Setup mandate details for the authorization

  // Statement Descriptor
  optional string statement_descriptor_name = 40; // Complete description that appears on customers' statements
  optional string statement_descriptor_suffix = 41; // Provides information about a card payment that customers see on their statements
  optional BillingDescriptor billing_descriptor = 42; // Billing Descriptor information to be sent to the payment gateway

  // State Information
  optional ConnectorState state = 43; // State data for access token storage and other connector-specific state

  // Order Line Items
  repeated OrderDetailsWithAmount order_details = 44; // Details about the different products for which the payment is being made

  // Locale Information
  optional string locale = 45; // Locale/language preference for the shopper (e.g., "en-US")

  // Tokenization Configuration
  optional Tokenization tokenization_strategy = 46; // Tokenization strategy for payment processing

  // Payment Method Token
  optional SecretString payment_method_token = 47;

  // URL for Redirection
  optional string continue_redirection_url = 48; // URL to complete authorization

  // Indicates if 3DS method data was successfully completed or not
  optional ThreeDsCompletionIndicator threeds_completion_indicator = 49;

  // Redirection Information after DDC step
  optional RedirectionResponse redirection_response = 50; // Redirection Response from client browser
}

// Response message for composite authorize flow.
message CompositeAuthorizeResponse {
  optional PaymentServiceCreateAccessTokenResponse access_token_response = 1; // Access token flow response
  optional PaymentServiceCreateConnectorCustomerResponse create_customer_response = 2; // Create customer flow response
  optional PaymentServiceAuthorizeResponse authorize_response = 3; // Authorize flow response
}

// Request message for composite get flow.
message CompositeGetRequest {
  // Identification
  Identifier transaction_id = 1; // The resource ID to synchronize

  // Reference
  optional Identifier request_ref_id = 2; // Reference ID for tracking

  // State Information
  optional ConnectorState state = 3; // State data for access token storage and other connector-specific state

  // Body of the response
  optional bytes handle_response = 4;

  // Amount Information
  int64 amount = 5; // The amount for the payment in minor currency units
  Currency currency = 6; // The currency for the payment, in ISO 4217 three-letter code

  // Payment Experience
  optional PaymentExperience payment_experience = 7; // Preferred payment experience

  // Capture Settings
  optional CaptureMethod capture_method = 8; // Method for capturing the payment

  // Encoded Data
  optional string encoded_data = 9; // Encoded context data for redirect flows, etc if applicable

  // Metadata
  optional SecretString metadata = 10; // Additional metadata for the connector
  optional FutureUsage setup_future_usage = 11; // Indicates future usage intention
  optional SecretString merchant_account_metadata = 12; // Account-level configuration metadata (e.g., merchant_name, brand_id)
  optional SecretString connector_metadata = 13; // Connector-specific metadata for the transaction
  optional SyncRequestType sync_type = 14; // Indicates the type of payment sync request

  // Connector Reference Id
  optional string connector_order_reference_id = 15; // Connector's reference id for order

  // Environment Configuration
  optional bool test_mode = 16; // A boolean value to indicate if the connector is in Test mode
}

// Response message for composite get flow.
message CompositeGetResponse {
  optional PaymentServiceCreateAccessTokenResponse access_token_response = 1; // Access token flow response
  PaymentServiceGetResponse get_response = 2; // Get flow response
}

// Request message for composite refund flow.
// Union of PaymentServiceCreateAccessTokenRequest + PaymentServiceRefundRequest fields (minus connector).
message CompositeRefundRequest {
  // Identification
  Identifier request_ref_id = 1; // Reference ID for tracking
  string refund_id = 2; // Unique identifier for the refund
  Identifier transaction_id = 3; // Transaction ID of the original payment

  // Amount Information
  int64 payment_amount = 4; // Original payment amount in major currency units
  Currency currency = 5; // Currency of the refund, ISO 4217 code
  int64 minor_payment_amount = 6; // Original payment amount in minor currency units
  int64 refund_amount = 7; // Amount to refund in major currency units
  int64 minor_refund_amount = 8; // Amount to refund in minor currency units

  // Refund Context
  optional string reason = 9; // Reason for the refund
  optional string webhook_url = 10; // URL for webhook notifications
  optional string merchant_account_id = 11; // Merchant account ID for the refund
  optional CaptureMethod capture_method = 12; // Capture method of the original payment

  // Metadata
  optional SecretString metadata = 13; // Metadata specific to the connector
  optional SecretString refund_metadata = 14; // Metadata specific to the refund
  optional SecretString connector_metadata = 15; // Connector-specific metadata

  // Browser Information
  optional BrowserInformation browser_info = 16; // Browser information, if relevant

  // State Information
  optional ConnectorState state = 17; // State data for access token storage and other connector-specific state

  // Account-Specific Configuration
  optional SecretString merchant_account_metadata = 18; // Account-level configuration metadata

  // Environment Configuration
  optional bool test_mode = 19; // A boolean value to indicate if the connector is in Test mode

  // Payment Method Type
  optional PaymentMethodType payment_method_type = 20; // Indicates the sub type of payment method

  // Customer Information
  optional string customer_id = 21; // Merchant's customer ID
}

// Response message for composite refund flow.
message CompositeRefundResponse {
  optional PaymentServiceCreateAccessTokenResponse access_token_response = 1; // Access token flow response (absent if token was cached)
  RefundResponse refund_response = 2; // Refund flow response
}

// Request message for composite refund sync flow.
// Union of PaymentServiceCreateAccessTokenRequest + RefundServiceGetRequest fields (minus connector).
message CompositeRefundSyncRequest {
  // Identification
  Identifier request_ref_id = 1; // Reference ID for tracking
  Identifier transaction_id = 2; // Transaction ID of the original payment
  string refund_id = 3; // Refund identifier to synchronize

  // Refund Details
  optional string refund_reason = 4; // Reason for the refund, if provided during sync

  // Browser Information
  optional BrowserInformation browser_info = 5; // Browser information, if relevant

  // Metadata
  optional SecretString refund_metadata = 6; // Metadata specific to the refund sync
  optional SecretString metadata = 11; // Additional metadata for the connector (from CreateAccessToken)
  optional SecretString connector_metadata = 12; // Connector-specific metadata (from CreateAccessToken)

  // State Information
  optional ConnectorState state = 7; // State data for access token storage and other connector-specific state

  // Account-Specific Configuration
  optional SecretString merchant_account_metadata = 8; // Account-level configuration metadata

  // Environment Configuration
  optional bool test_mode = 9; // A boolean value to indicate if the connector is in Test mode

  // Payment Method Type
  optional PaymentMethodType payment_method_type = 10; // Indicates the sub type of payment method
}

// Response message for composite refund sync flow.
message CompositeRefundSyncResponse {
  optional PaymentServiceCreateAccessTokenResponse access_token_response = 1; // Access token flow response (absent if token was cached)
  RefundResponse refund_sync_response = 2; // Refund sync flow response
}
