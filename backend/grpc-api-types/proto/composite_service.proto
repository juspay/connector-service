syntax = "proto3";

package types;

import "composite_payment.proto";

option go_package = "github.com/juspay/connector-service/backend/grpc-api-types/proto;proto";

// Service for composite payment operations.
service CompositePaymentService {
  // Runs composite authorize flow.
  rpc CompositeAuthorize(CompositeAuthorizeRequest) returns (CompositeAuthorizeResponse);

  // Runs composite get flow.
  rpc CompositeGet(CompositeGetRequest) returns (CompositeGetResponse);
}

// Service for composite payment method authentication operations.
service CompositePaymentMethodAuthenticationService {
  // Initiate 3DS flow before payment authorization.
  // For frictionless, performs Next step after Preauthenticate
  // For Challenge, returns challenge-based verification
  rpc CompositePreauthenticate(CompositePreauthenticateRequest) returns (CompositePreauthenticateResponse);

  // Execute 3DS challenge or frictionless verification.
  rpc CompositeAuthenticate(CompositeAuthenticateRequest) returns (CompositeAuthenticateResponse);
}
