# Byne pipeline configuration
# Fill in llm.baseUrl and llm.apiKey below, then start the engine with `pnpm dev`.

projectRoot: /Users/jeeva.ramachandran/Workspace/hyperswitch-prism # target repo (relative to byne dir or absolute)
devServerUrl: http://localhost:9000 # hyperswitch webpack-dev-server default
designMatchThreshold: 0.90
maxRetries: 3
dashboardPort: 3141
wsPort: 3142

opencode:
  # opencode CLI is used for L2 (research), L3, L4 and per-file implementation steps
  # so that the model can use tools (web_search, read_file, grep, write).
  # Model is left empty to use opencode default (kimi-latest)
  model: "" # Use opencode default model
  attachUrl: "http://127.0.0.1:4096" # running `opencode serve` instance
  timeoutMs: 900000 # per-call hard timeout (15 min)
  implementationConcurrency: 4

llm:
  # === FILL THESE IN ===
  baseUrl: "https://grid.ai.juspay.net/v1/chat/completions" # e.g. https://llm.yourhost.internal
  apiKey: "" # your hosted model API key
  model: "kimi-latest" # default model for all checkpoints

  # Per-checkpoint model overrides. Falls back to `model` when unset.
  # Use stronger models for steps that need repo reasoning or bulk code generation.
  models:
    {}
    # l3_gen: "claude-sonnet-4-6"
    # l4_gen: "claude-sonnet-4-6"
    # implementation: "claude-sonnet-4-6"

  # "openai"     -> POSTs to {baseUrl}/v1/chat/completions with {model, messages}
  # "anthropic"  -> POSTs to {baseUrl}/v1/messages            with {model, system, messages}
  protocol: openai

  maxTokens: 4000
  temperature: 0
  timeoutMs: 180000

  # Auth header customization. Defaults work for most hosted gateways.
  authHeader: "Authorization" # header name
  authScheme: "Bearer" # prefix; set to "" to send raw key
  extraHeaders:
    {} # any custom headers your gateway requires
    # x-tenant-id: juspay
    # x-client:    byne

checkpoints:
  compiler:
    command: cargo
    args: ["build", "--package", "connector-integration"] # Rust build for hyperswitch-prism
  cypress:
    command: npm
    args: ["run", "cy:run"] # control-center script: starts hyperswitch then runs cypress
  playwright:
    command: npm
    args: ["run", "pw:test"] # control-center script: runs playwright test
  regression:
    enabled: false # PAUSED — set to true to re-enable
    command: npm
    args: ["run", "re:build"]
  design_match:
    enabled: true
    screenshotRoute: "/"
  pr_review:
    requireHumanApproval: false
    humanApprovalTimeoutMs: 300000
