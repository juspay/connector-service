<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10xGrace Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{surface:'#0f1117',card:'#1a1d27',border:'#2a2d3a',accent:'#7c3aed',green:'#10b981',red:'#ef4444',yellow:'#f59e0b',blue:'#3b82f6'}}}}</script>
  <style>
    body { background: #0f1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; }
    .card:hover { border-color: #3a3d4a; }
    .column { min-height: 400px; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .step-line { border-left: 2px solid #2a2d3a; margin-left: 11px; padding-left: 20px; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }
    .modal-overlay { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
  </style>
</head>
<body class="text-gray-200 min-h-screen">
  <!-- Header -->
  <header class="border-b border-[#2a2d3a] px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-[#7c3aed] flex items-center justify-center font-bold text-sm">10x</div>
      <h1 class="text-lg font-semibold">10xGrace Dashboard</h1>
    </div>
    <div class="flex items-center gap-4 text-sm">
      <button onclick="pollNow()" id="poll-btn" class="bg-[#7c3aed] hover:bg-[#6d28d9] text-white px-3 py-1 rounded text-xs font-medium">Poll Now</button>
      <span id="pool-badge" class="text-gray-500">Pool: 0/3</span>
      <span id="cycle-badge" class="text-gray-500">Waiting...</span>
      <span id="live-dot" class="flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-green-500 pulse"></span>
        <span class="text-gray-400">Live</span>
      </span>
    </div>
  </header>

  <!-- Kanban Board -->
  <main class="p-6 pb-16">
    <div class="grid grid-cols-4 gap-4">
      <!-- Queued -->
      <div class="column">
        <div class="flex items-center gap-2 mb-3">
          <span class="w-2.5 h-2.5 rounded-full bg-gray-500"></span>
          <span class="font-medium text-sm">Queued</span>
          <span id="backlog-count" class="text-xs text-gray-500 bg-[#1a1d27] px-2 py-0.5 rounded-full">0</span>
        </div>
        <div id="backlog-col" class="space-y-2"></div>
      </div>

      <!-- In Progress -->
      <div class="column">
        <div class="flex items-center gap-2 mb-3">
          <span class="w-2.5 h-2.5 rounded-full bg-blue-500 pulse"></span>
          <span class="font-medium text-sm">In Progress</span>
          <span id="progress-count" class="text-xs text-gray-500 bg-[#1a1d27] px-2 py-0.5 rounded-full">0</span>
        </div>
        <div id="progress-col" class="space-y-2"></div>
      </div>

      <!-- Completed -->
      <div class="column">
        <div class="flex items-center gap-2 mb-3">
          <span class="w-2.5 h-2.5 rounded-full bg-green-500"></span>
          <span class="font-medium text-sm">Completed</span>
          <span id="completed-count" class="text-xs text-gray-500 bg-[#1a1d27] px-2 py-0.5 rounded-full">0</span>
        </div>
        <div id="completed-col" class="space-y-2"></div>
      </div>

      <!-- Failed -->
      <div class="column">
        <div class="flex items-center gap-2 mb-3">
          <span class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
          <span class="font-medium text-sm">Failed / Blocked</span>
          <span id="failed-count" class="text-xs text-gray-500 bg-[#1a1d27] px-2 py-0.5 rounded-full">0</span>
          <button onclick="retryAllFailed()" class="text-xs text-gray-500 hover:text-gray-300 ml-auto">Retry All</button>
        </div>
        <div id="failed-col" class="space-y-2"></div>
      </div>
    </div>
  </main>

  <!-- PR Detail Modal -->
  <div id="pr-modal" class="fixed inset-0 modal-overlay z-50 hidden flex items-start justify-center pt-12 px-4">
    <div class="bg-[#1a1d27] border border-[#2a2d3a] rounded-xl w-full max-w-4xl max-h-[82vh] overflow-hidden flex flex-col fade-in">
      <div class="flex items-center justify-between px-5 py-3 border-b border-[#2a2d3a]">
        <h2 id="modal-title" class="font-semibold text-sm"></h2>
        <button onclick="closeModal()" class="text-gray-500 hover:text-gray-300 text-lg leading-none">&times;</button>
      </div>
      <div id="modal-body" class="flex-1 overflow-hidden flex"></div>
    </div>
  </div>

  <!-- Status Bar -->
  <footer class="fixed bottom-0 left-0 right-0 border-t border-[#2a2d3a] bg-[#0f1117] px-6 py-2 flex items-center justify-between text-xs text-gray-500">
    <div id="status-text" class="flex items-center gap-2">
      <span class="w-1.5 h-1.5 rounded-full bg-gray-500" id="status-dot"></span>
      <span id="status-msg">Idle — waiting for next poll cycle</span>
    </div>
    <div id="status-meta" class="flex items-center gap-4">
      <span id="status-pool">Pool: 0/3</span>
      <span id="status-last-poll">Last poll: never</span>
    </div>
  </footer>

  <script>
    // ── State ──
    const state = {
      backlog: [],
      inProgress: [],
      completed: [],
      failed: [],
      currentPR: null,
      selectedComment: null, // index into allComments for right panel
      stepsByPR: {},
    };

    // ── Helpers ──
    function groupByPR(items, prKey) {
      const groups = {};
      for (const item of items) {
        const pr = item[prKey || 'pr_number'] || item.pr;
        if (!pr) continue;
        if (!groups[pr]) groups[pr] = { pr_number: pr, comments: [] };
        groups[pr].comments.push(item);
      }
      return groups;
    }

    function extractConnector(path) {
      if (!path || !path.includes('connectors/')) return '';
      const after = path.split('connectors/').pop();
      return after.split('/')[0].replace('.rs', '');
    }

    function getConnectors(comments) {
      const set = new Set();
      for (const c of comments) {
        const conn = extractConnector(c.path || '');
        if (conn) set.add(conn);
      }
      return [...set];
    }

    function timeAgo(iso) {
      if (!iso) return '';
      const diff = (Date.now() - new Date(iso).getTime()) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    // ── PR Card Templates ──
    function prCardQueued(pr, comments) {
      const connectors = getConnectors(comments);
      const authors = [...new Set(comments.map(c => c.author).filter(Boolean))];
      return `<div class="card p-3 fade-in cursor-pointer" onclick="openPRDetail(${pr})">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-xs font-mono text-[#7c3aed]">PR #${pr}</span>
          <span class="text-xs bg-gray-500/20 text-gray-400 px-1.5 py-0.5 rounded">${comments.length} comment${comments.length > 1 ? 's' : ''}</span>
        </div>
        ${connectors.length > 0 ? `<div class="flex gap-1 mb-1">${connectors.map(c => `<span class="text-xs bg-[#7c3aed]/20 text-[#a78bfa] px-1.5 py-0.5 rounded">${c}</span>`).join('')}</div>` : ''}
        <div class="text-xs text-gray-400 mt-1 line-clamp-2">${comments.slice(0, 2).map(c => c.instruction || '').join(' | ')}</div>
        ${authors.length > 0 ? `<div class="text-xs text-gray-600 mt-1">@${authors.join(', @')}</div>` : ''}
      </div>`;
    }

    function progressCard(item) {
      const pr = item.pr_number || item.pr;
      const prSteps = state.stepsByPR[pr] || {};
      const prGates = prSteps['_pr'] || [];
      const connectors = Object.keys(prSteps).filter(k => k !== '_pr');

      let stepsHTML = '';
      if (prGates.length > 0) {
        stepsHTML += prGates.slice(-3).map(s => {
          const icon = s.icon === 'pass' ? '&#10003;' : s.icon === 'fail' ? '&#10007;' : '&#9889;';
          const color = s.icon === 'pass' ? 'text-green-400' : s.icon === 'fail' ? 'text-red-400' : 'text-yellow-400';
          return `<div class="text-xs ${color} mt-0.5">${icon} ${s.text} <span class="text-gray-500">${(s.detail || '').slice(0, 40)}</span></div>`;
        }).join('');
      }
      if (connectors.length > 0) {
        stepsHTML += connectors.map(c => {
          const steps = prSteps[c] || [];
          const last = steps.length > 0 ? steps[steps.length-1] : null;
          const icon = last ? (last.icon === 'pass' ? '&#10003;' : last.icon === 'fail' ? '&#10007;' : '&#9889;') : '&#9675;';
          const color = last?.icon === 'pass' ? 'text-green-400' : last?.icon === 'fail' ? 'text-red-400' : 'text-gray-400';
          return `<div class="text-xs ${color} mt-0.5">${icon} <span class="text-[#7c3aed]">${c}</span> ${last ? '— ' + last.text : ''}</div>`;
        }).join('');
      }
      if (!stepsHTML) stepsHTML = '<div class="text-xs text-gray-500 mt-1">Waiting...</div>';

      return `<div class="card p-3 fade-in cursor-pointer border-blue-500/30" onclick="openPRDetail(${pr})">
        <div class="flex items-center justify-between mb-1">
          <span class="text-xs font-mono text-blue-400">PR #${pr}</span>
          <span class="w-2 h-2 rounded-full bg-blue-500 pulse"></span>
        </div>
        <div class="text-xs text-gray-500 mb-1">${item.thread_count || 1} comment(s)</div>
        ${stepsHTML}
      </div>`;
    }

    function prCardCompleted(pr, comments) {
      const latest = comments.reduce((a, b) => (a.processed_at || '') > (b.processed_at || '') ? a : b, comments[0]);
      const connectors = getConnectors(comments);
      const sha = comments.find(c => c.commit_sha)?.commit_sha || '';
      return `<div class="card p-3 fade-in cursor-pointer" onclick="openPRDetail(${pr})">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-xs font-mono text-green-400">PR #${pr}</span>
          <span class="text-xs text-gray-500">${timeAgo(latest.processed_at)}</span>
        </div>
        <div class="flex items-center gap-2 mb-1">
          <span class="text-xs bg-green-500/20 text-green-400 px-1.5 py-0.5 rounded">${comments.length} fixed</span>
          ${connectors.map(c => `<span class="text-xs bg-[#7c3aed]/20 text-[#a78bfa] px-1.5 py-0.5 rounded">${c}</span>`).join('')}
        </div>
        ${sha ? `<div class="text-xs text-green-500/60 font-mono mt-1">${sha.slice(0,12)}</div>` : ''}
      </div>`;
    }

    function prCardFailed(pr, comments) {
      const latest = comments.reduce((a, b) => (a.processed_at || '') > (b.processed_at || '') ? a : b, comments[0]);
      const hasBlocked = comments.some(c => c.status === 'build_blocked');
      const borderColor = hasBlocked ? 'border-yellow-500/20' : 'border-red-500/20';
      const titleColor = hasBlocked ? 'text-yellow-400' : 'text-red-400';
      const badge = hasBlocked
        ? `<span class="text-xs bg-yellow-500/20 text-yellow-400 px-1.5 py-0.5 rounded">${comments.length} blocked</span>`
        : `<span class="text-xs bg-red-500/20 text-red-400 px-1.5 py-0.5 rounded">${comments.length} failed</span>`;
      const connectors = getConnectors(comments);

      return `<div class="card p-3 fade-in cursor-pointer ${borderColor}" onclick="openPRDetail(${pr})">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-xs font-mono ${titleColor}">PR #${pr}</span>
          <span class="text-xs text-gray-500">${timeAgo(latest.processed_at)}</span>
        </div>
        <div class="flex items-center gap-2 mb-1">
          ${badge}
          ${connectors.map(c => `<span class="text-xs bg-[#7c3aed]/20 text-[#a78bfa] px-1.5 py-0.5 rounded">${c}</span>`).join('')}
        </div>
        <div class="text-xs text-gray-500 mt-1 truncate">${(latest.error || '').slice(0, 60)}</div>
      </div>`;
    }

    // ── PR Detail Modal ──
    function openPRDetail(prNumber) {
      state.currentPR = prNumber;
      state.selectedComment = null;
      document.getElementById('pr-modal').classList.remove('hidden');
      renderModal();
    }

    function closeModal() {
      document.getElementById('pr-modal').classList.add('hidden');
      state.currentPR = null;
      state.selectedComment = null;
    }

    function selectComment(idx) {
      state.selectedComment = idx;
      renderModal();
    }

    document.getElementById('pr-modal')?.addEventListener('click', (e) => {
      if (e.target.id === 'pr-modal') closeModal();
    });

    function getCommentPhase(pr, comment) {
      const tid = comment.thread_id;
      if (state.completed.some(c => c.thread_id === tid && c.pr_number == pr)) return 'fixed';
      if (state.failed.some(f => f.thread_id === tid && f.pr_number == pr)) return 'failed';
      const isActive = state.inProgress.some(p => (p.pr_number || p.pr) == pr);
      if (!isActive) return 'queued';
      const prSteps = state.stepsByPR[pr];
      if (!prSteps) return 'queued';
      const conn = extractConnector(comment.path || '');
      const connSteps = conn ? (prSteps[conn] || []) : [];
      if (connSteps.some(s => s.text && (s.text.startsWith('Committed') || s.text === 'Fixed'))) return 'fixed';
      const hasBuild = connSteps.some(s => s.text && (s.text.startsWith('Build') || s.text.startsWith('Clippy') || s.text.startsWith('Format')));
      if (hasBuild) return 'building';
      const instruction = (comment.instruction || '').slice(0, 30);
      const wasResolved = connSteps.some(s => (s.text || '').includes('Resolving comment') && (s.text || '').includes(instruction));
      if (wasResolved) {
        const myIdx = connSteps.findIndex(s => (s.text || '').includes('Resolving comment') && (s.text || '').includes(instruction));
        const laterResolving = connSteps.slice(myIdx + 1).some(s => (s.text || '').match(/Resolving comment \d+\/\d+/));
        return laterResolving ? 'building' : 'resolving';
      }
      if (connSteps.some(s => (s.text || '').match(/Resolving comment/))) return 'queued';
      return 'queued';
    }

    const phaseConfig = {
      queued:    { icon: '&#9675;', label: 'Queued', color: 'text-gray-400', bg: 'bg-gray-500/20', badge: 'text-gray-400' },
      resolving: { icon: '&#9889;', label: 'Resolving', color: 'text-yellow-400', bg: 'bg-yellow-500/20', badge: 'text-yellow-400' },
      building:  { icon: '&#9881;', label: 'Building', color: 'text-blue-400', bg: 'bg-blue-500/20', badge: 'text-blue-400' },
      fixed:     { icon: '&#10003;', label: 'Fixed', color: 'text-green-400', bg: 'bg-green-500/20', badge: 'text-green-400' },
      failed:    { icon: '&#10007;', label: 'Failed', color: 'text-red-400', bg: 'bg-red-500/20', badge: 'text-red-400' },
    };

    function renderModal() {
      const container = document.getElementById('modal-body');
      const pr = state.currentPR;
      if (!pr) return;

      const completed = state.completed.filter(c => c.pr_number == pr);
      const failed = state.failed.filter(f => f.pr_number == pr);
      const queued = state.backlog.filter(b => (b.pr || b.pr_number) == pr);
      const allComments = [...queued, ...completed, ...failed];

      // Add phase to each
      const comments = allComments.map(c => ({ ...c, _phase: getCommentPhase(pr, c) }));

      const total = comments.length;
      document.getElementById('modal-title').textContent = `PR #${pr} — ${total} comment${total !== 1 ? 's' : ''}`;

      // ── LEFT PANEL: Comment list ──
      let leftHTML = '<div class="text-xs text-gray-500 font-medium uppercase tracking-wide px-4 pt-3 pb-2">Comments</div>';
      if (comments.length === 0) {
        leftHTML += '<div class="text-xs text-gray-600 px-4 py-8 text-center">No comments</div>';
      }
      comments.forEach((c, idx) => {
        const cfg = phaseConfig[c._phase] || phaseConfig.queued;
        const file = (c.path || '').split('/').pop() || '';
        const line = c.line ? ':' + c.line : '';
        const selected = state.selectedComment === idx;
        const selectedBorder = selected ? 'border-[#7c3aed] bg-[#7c3aed]/10' : 'border-transparent hover:border-[#3a3d4a]';
        leftHTML += `<div class="px-3 py-2 cursor-pointer border-l-2 ${selectedBorder} transition-colors" onclick="selectComment(${idx})">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-1.5 min-w-0">
              <span class="${cfg.color} text-xs flex-shrink-0">${cfg.icon}</span>
              <span class="text-xs font-mono text-gray-300 truncate">${file}${line}</span>
            </div>
            <span class="text-xs ${cfg.badge} ${cfg.bg} px-1.5 py-0.5 rounded flex-shrink-0 ml-2">${cfg.label}</span>
          </div>
          <div class="text-xs text-gray-500 mt-0.5 truncate pl-5">${(c.instruction || '').slice(0, 50)}</div>
        </div>`;
      });

      // ── RIGHT PANEL: Details ──
      let rightHTML = '';
      const sel = state.selectedComment !== null ? comments[state.selectedComment] : null;

      if (sel) {
        // Selected comment detail
        const cfg = phaseConfig[sel._phase] || phaseConfig.queued;
        const file = (sel.path || '').split('/').pop() || '';
        rightHTML += `<div class="px-4 pt-3">
          <div class="flex items-center gap-2 mb-2">
            <span class="${cfg.color}">${cfg.icon}</span>
            <span class="text-sm font-mono text-gray-200">${file}${sel.line ? ':' + sel.line : ''}</span>
            <span class="text-xs ${cfg.badge} ${cfg.bg} px-1.5 py-0.5 rounded">${cfg.label}</span>
          </div>
          <div class="text-xs text-gray-300 mb-3">${sel.instruction || ''}</div>`;

        if (sel.resolution_summary) {
          rightHTML += `<div class="mb-3"><div class="text-xs text-gray-500 font-medium mb-1">Resolution</div>
            <div class="text-xs text-gray-300 bg-[#0f1117] p-3 rounded-lg border border-[#2a2d3a]">${sel.resolution_summary}</div></div>`;
        }
        if (sel.commit_sha) {
          rightHTML += `<div class="text-xs text-green-500/60 font-mono mb-3">Commit: ${sel.commit_sha.slice(0, 12)}</div>`;
        }
        if (sel.error) {
          rightHTML += `<div class="mb-3"><div class="text-xs text-gray-500 font-medium mb-1">Error</div>
            <div class="text-xs text-red-300/70 bg-[#0f1117] p-3 rounded-lg border border-red-500/20">${sel.error}</div></div>`;
        }
        if (sel._phase === 'resolving') {
          rightHTML += '<div class="text-xs text-yellow-400 pulse mb-3">Claude is working on this comment...</div>';
        }
        if (sel._phase === 'building') {
          rightHTML += '<div class="text-xs text-blue-400 mb-3">Running Build / Clippy / Format...</div>';
        }
        if (sel.thread_id && sel._phase === 'failed' && sel.status !== 'build_blocked') {
          rightHTML += `<button onclick="retryThread('${sel.thread_id}')" class="text-xs bg-[#2a2d3a] hover:bg-[#3a3d4a] text-gray-300 px-3 py-1.5 rounded mb-3">Retry This Comment</button>`;
        }
        rightHTML += '</div>';
      }

      // Activity log (always shown, below selected comment or as default)
      const prSteps = state.stepsByPR[pr];
      if (prSteps && Object.keys(prSteps).length > 0) {
        rightHTML += `<div class="${sel ? 'border-t border-[#2a2d3a] mt-2' : ''} px-4 pt-3">
          <div class="text-xs text-gray-500 font-medium uppercase tracking-wide mb-2">Activity Log</div>
          <div class="step-line space-y-1">`;

        const prGates = prSteps['_pr'] || [];
        prGates.forEach(s => { rightHTML += modalStepHTML(s); });

        for (const [connector, steps] of Object.entries(prSteps)) {
          if (connector === '_pr') continue;
          rightHTML += `<div class="mt-2 mb-1 -ml-5"><span class="text-xs font-semibold text-[#7c3aed]">[${connector}]</span></div>`;
          steps.forEach(s => { rightHTML += modalStepHTML(s); });
        }
        rightHTML += '</div></div>';
      }

      if (!sel && (!prSteps || Object.keys(prSteps).length === 0)) {
        rightHTML = '<div class="text-xs text-gray-500 px-4 pt-8 text-center">Select a comment to view details</div>';
      }

      container.innerHTML = `
        <div class="w-2/5 border-r border-[#2a2d3a] overflow-y-auto flex-shrink-0">${leftHTML}</div>
        <div class="w-3/5 overflow-y-auto">${rightHTML}</div>`;
    }

    let _modalStepId = 0;
    function modalStepHTML(s) {
      const id = `ms-${_modalStepId++}`;
      const color = s.color || (s.icon === 'pass' ? 'text-green-400' : s.icon === 'fail' ? 'text-red-400' : s.icon === 'tool' ? 'text-yellow-400' : 'text-blue-300');
      const icon = s.icon === 'pass' ? '&#10003;' : s.icon === 'fail' ? '&#10007;' : s.icon === 'tool' ? '&#9889;' : s.icon === 'start' ? '&#9654;' : '&#128172;';
      const output = s.output || '';
      return `<div class="flex items-start gap-2 py-0.5">
        <span class="text-xs mt-0.5">${icon}</span>
        <div class="flex-1 min-w-0">
          <span class="text-xs ${color}">${s.text || ''}</span>
          ${s.detail ? `<span class="text-xs text-gray-500 ml-1">${(s.detail || '').slice(0, 80)}</span>` : ''}
          ${output.length > 0 ? `
            <button onclick="document.getElementById('${id}').classList.toggle('hidden')" class="text-xs text-gray-500 hover:text-gray-300 ml-1 underline">[show output]</button>
            <pre id="${id}" class="hidden mt-1 text-xs text-gray-300 bg-[#0a0c10] p-3 rounded-lg overflow-auto whitespace-pre-wrap break-words border border-[#2a2d3a] font-mono leading-5" style="max-height: 300px;">${output.replace(/</g,'&lt;')}</pre>
          ` : ''}
        </div>
      </div>`;
    }

    // ── Actions ──
    async function retryThread(threadId) {
      if (!threadId) return;
      const res = await fetch('/api/retry/' + threadId, {method: 'POST'});
      const data = await res.json();
      if (data.ok) {
        loadState();
        document.getElementById('status-msg').textContent = 'Retrying thread — will be picked up next cycle';
      }
    }

    async function retryAllFailed() {
      const res = await fetch('/api/retry-all-failed', {method: 'POST'});
      const data = await res.json();
      if (data.ok) {
        loadState();
        document.getElementById('status-msg').textContent = `Retrying ${data.retried} failed threads`;
      }
    }

    async function pollNow() {
      const btn = document.getElementById('poll-btn');
      btn.disabled = true;
      btn.textContent = 'Polling...';
      btn.classList.add('opacity-50');
      try {
        const res = await fetch('/api/poll-now', {method: 'POST'});
        const data = await res.json();
        if (data.ok) {
          document.getElementById('status-msg').textContent = 'Poll triggered — checking for @HS-prism-bot comments...';
        }
      } finally {
        setTimeout(() => {
          btn.disabled = false;
          btn.textContent = 'Poll Now';
          btn.classList.remove('opacity-50');
        }, 5000);
      }
    }

    // ── Render Columns (PR-grouped) ──
    function render() {
      // Group backlog by PR
      const backlogPRs = groupByPR(state.backlog, 'pr');
      document.getElementById('backlog-col').innerHTML =
        Object.entries(backlogPRs).map(([pr, g]) => prCardQueued(pr, g.comments)).join('');

      // In Progress — already PR-level
      document.getElementById('progress-col').innerHTML =
        state.inProgress.map(progressCard).join('');

      // Group completed by PR
      const completedPRs = groupByPR(state.completed);
      const completedEntries = Object.entries(completedPRs);
      completedEntries.sort((a, b) => {
        const aTime = Math.max(...a[1].comments.map(c => new Date(c.processed_at || 0).getTime()));
        const bTime = Math.max(...b[1].comments.map(c => new Date(c.processed_at || 0).getTime()));
        return bTime - aTime;
      });
      document.getElementById('completed-col').innerHTML =
        completedEntries.slice(0, 20).map(([pr, g]) => prCardCompleted(pr, g.comments)).join('');

      // Group failed by PR
      const failedPRs = groupByPR(state.failed);
      const failedEntries = Object.entries(failedPRs);
      failedEntries.sort((a, b) => {
        const aTime = Math.max(...a[1].comments.map(c => new Date(c.processed_at || 0).getTime()));
        const bTime = Math.max(...b[1].comments.map(c => new Date(c.processed_at || 0).getTime()));
        return bTime - aTime;
      });
      document.getElementById('failed-col').innerHTML =
        failedEntries.slice(0, 10).map(([pr, g]) => prCardFailed(pr, g.comments)).join('');

      // Counts show PR count
      document.getElementById('backlog-count').textContent = Object.keys(backlogPRs).length;
      document.getElementById('progress-count').textContent = state.inProgress.length;
      document.getElementById('completed-count').textContent = completedEntries.length;
      document.getElementById('failed-count').textContent = failedEntries.length;

      // Re-render modal if open
      if (state.currentPR) renderModal();
    }

    // ── Load initial state ──
    async function loadState() {
      try {
        const res = await fetch('/api/state');
        const data = await res.json();
        state.completed = data.completed || [];
        state.failed = data.failed || [];

        const doneTids = new Set([
          ...state.completed.map(c => c.thread_id).filter(Boolean),
          ...state.failed.map(f => f.thread_id).filter(Boolean),
        ]);
        const donePRs = new Set([
          ...state.completed.map(c => c.pr_number).filter(Boolean),
          ...state.failed.map(f => f.pr_number).filter(Boolean),
        ]);

        state.backlog = (data.backlog || []).filter(b => !doneTids.has(b.thread_id));
        state.inProgress = (data.in_progress || []).filter(p => !donePRs.has(p.pr_number));

        const serverSteps = data.steps_by_pr || {};
        for (const [pr, connectors] of Object.entries(serverSteps)) {
          const prNum = parseInt(pr);
          if (!state.stepsByPR[prNum]) state.stepsByPR[prNum] = {};
          for (const [connector, steps] of Object.entries(connectors)) {
            if (!state.stepsByPR[prNum][connector] || state.stepsByPR[prNum][connector].length === 0) {
              state.stepsByPR[prNum][connector] = steps.map(s => ({
                icon: s.icon || 'text',
                color: s.icon === 'pass' ? 'text-green-400' : s.icon === 'fail' ? 'text-red-400' : s.icon === 'tool' ? 'text-yellow-400' : 'text-blue-300',
                text: s.text || '',
                detail: s.detail || '',
                output: s.output || '',
              }));
            }
          }
        }

        if (data.pool) {
          const busy = data.pool.filter(s => s.busy).length;
          const total = data.pool.length;
          document.getElementById('pool-badge').textContent = `Pool: ${busy}/${total}`;
          document.getElementById('status-pool').textContent = `Pool: ${busy}/${total} active`;
        }
        if (data.last_poll) {
          document.getElementById('status-last-poll').textContent = `Last poll: ${timeAgo(data.last_poll)}`;
        }

        render();
      } catch (e) {
        console.error('Failed to load state:', e);
      }
    }

    // ── SSE Connection ──
    function connectSSE() {
      const source = new EventSource('/api/events');
      source.onmessage = (e) => {
        try { handleEvent(JSON.parse(e.data)); } catch (err) { console.error('SSE parse error:', err); }
      };
      source.onerror = () => {
        document.getElementById('live-dot').querySelector('span').classList.replace('bg-green-500', 'bg-red-500');
        setTimeout(() => { source.close(); connectSSE(); }, 3000);
      };
      source.onopen = () => {
        const dot = document.getElementById('live-dot').querySelector('span');
        dot.classList.replace('bg-red-500', 'bg-green-500');
      };
    }

    // ── Status Bar ──
    function setStatus(eventType, event) {
      const msg = document.getElementById('status-msg');
      const dot = document.getElementById('status-dot');
      const statusMap = {
        'cycle_start': [`Polling GitHub... (cycle #${event.cycle})`, 'bg-blue-500'],
        'no_comments': ['No @HS-prism-bot comments found', 'bg-gray-500'],
        'comment_found': [`Found comment on ${event.path || ''}`, 'bg-yellow-500'],
        'pr_start': [`Processing PR #${event.pr_number}...`, 'bg-blue-500'],
        'clone_acquired': [`Acquired clone slot ${event.slot_id} for PR #${event.pr}`, 'bg-blue-500'],
        'gate': [`Gate: ${event.name} — ${event.passed ? 'PASS' : 'FAIL'}`, event.passed ? 'bg-green-500' : 'bg-red-500'],
        'subtask_start': [`[${event.connector}] Started (${event.comment_count} comments)`, 'bg-blue-500'],
        'subtask_gate': [`[${event.connector}] ${event.gate}: ${event.passed ? 'PASS' : 'FAIL'}`, event.passed ? 'bg-green-500' : 'bg-red-500'],
        'subtask_agent_tool': [`[${event.connector}] Claude: ${event.tool} ${event.input_summary || ''}`, 'bg-yellow-500'],
        'subtask_agent_text': [`[${event.connector}] Claude: ${(event.text || '').slice(0, 80)}`, 'bg-blue-400'],
        'subtask_committed': [`[${event.connector}] Committed ${(event.sha || '').slice(0, 8)}`, 'bg-green-500'],
        'subtask_fixed': [`[${event.connector}] Fixed!`, 'bg-green-500'],
        'subtask_failed': [`[${event.connector}] Failed: ${event.error || ''}`, 'bg-red-500'],
        'pr_pushed': [`Pushed commits for PR #${event.pr}`, 'bg-green-500'],
        'pr_queued': [`PR #${event.pr} queued (position ${event.position})`, 'bg-gray-500'],
        'cycle_end': [`Cycle done: ${event.fixed || 0} fixed, ${event.failed || 0} failed`, 'bg-gray-500'],
      };
      const [text, color] = statusMap[eventType] || [eventType, 'bg-gray-500'];
      msg.textContent = text;
      dot.className = `w-1.5 h-1.5 rounded-full ${color}`;
    }

    // ── Step tracking helpers ──
    function addSubStep(prNumber, connector, icon, color, text, detail, output) {
      if (!state.stepsByPR[prNumber]) state.stepsByPR[prNumber] = {};
      if (!state.stepsByPR[prNumber][connector]) state.stepsByPR[prNumber][connector] = [];
      state.stepsByPR[prNumber][connector].push({ icon, color, text, detail, output: output || '' });
      if (state.currentPR === prNumber) renderModal();
    }

    // ── Event Handler ──
    let activePR = null;

    function handleEvent(event) {
      const t = event.type;
      setStatus(t, event);

      if (t === 'cycle_start') {
        document.getElementById('cycle-badge').textContent = `Cycle #${event.cycle}`;
        state.backlog = [];
        state.inProgress = [];
        render();

      } else if (t === 'comment_found') {
        const tid = event.thread_id || `${event.pr}_${event.path}_${event.line}`;
        if (!state.backlog.some(b => (b.thread_id || `${b.pr}_${b.path}_${b.line}`) === tid)) {
          state.backlog.push({...event, thread_id: tid});
        }
        render();

      } else if (t === 'pr_start') {
        activePR = event.pr_number;
        state.backlog = state.backlog.filter(b => b.pr !== event.pr_number);
        if (!state.inProgress.some(p => (p.pr_number || p.pr) === activePR)) {
          state.inProgress.push(event);
        }
        state.stepsByPR[activePR] = {};
        render();
        openPRDetail(activePR);

      } else if (t === 'clone_acquired') {
        if (event.pr) addSubStep(event.pr, '_pr', 'pass', 'text-green-400', `Clone slot ${event.slot_id} acquired`, '');

      } else if (t === 'gate') {
        const pr = event.pr || activePR;
        if (pr) {
          addSubStep(pr, '_pr', event.passed ? 'pass' : 'fail', event.passed ? 'text-green-400' : 'text-red-400', event.name || '', event.detail || '', event.output || '');
          render();
        }

      } else if (t.startsWith('subtask_')) {
        const pr = event.pr || activePR;
        const connector = event.connector || '_pr';
        if (!pr) return;

        if (t === 'subtask_start') {
          addSubStep(pr, connector, 'start', 'text-blue-400', `Started (${event.comment_count || 0} comments)`, '');
        } else if (t === 'subtask_gate') {
          addSubStep(pr, connector, event.passed ? 'pass' : 'fail', event.passed ? 'text-green-400' : 'text-red-400', event.gate || event.name || '', event.detail || '', event.output || '');
        } else if (t === 'subtask_agent_tool') {
          addSubStep(pr, connector, 'tool', 'text-yellow-400', event.tool || '', event.input_summary || '');
        } else if (t === 'subtask_agent_text') {
          addSubStep(pr, connector, 'text', 'text-blue-300', (event.text || '').slice(0, 100), '');
        } else if (t === 'subtask_committed') {
          addSubStep(pr, connector, 'pass', 'text-green-400', `Committed ${(event.sha || '').slice(0, 8)}`, '');
        } else if (t === 'subtask_fixed') {
          addSubStep(pr, connector, 'pass', 'text-green-400', 'Fixed', '');
        } else if (t === 'subtask_failed') {
          addSubStep(pr, connector, 'fail', 'text-red-400', 'Failed', event.error || '');
        }
        render();

      } else if (t === 'pr_queued') {
        state.backlog.push({pr: event.pr, instruction: `Queued (position ${event.position || '?'})`, path: '', author: '', line: null});
        render();

      } else if (t === 'pr_pushed') {
        if (activePR) addSubStep(activePR, '_pr', 'pass', 'text-green-400', `Pushed ${(event.sha || '').slice(0,8)}`, '');

      } else if (t === 'fixed') {
        const pr = event.pr;
        state.inProgress = state.inProgress.filter(p => (p.pr_number || p.pr) !== pr);
        state.completed.unshift({
          thread_id: event.thread_id, pr_number: pr, path: event.path,
          instruction: event.instruction, commit_sha: event.commit_sha,
          processed_at: new Date().toISOString(), status: 'fixed',
        });
        render();

      } else if (t === 'failed') {
        const pr = event.pr || activePR;
        state.inProgress = state.inProgress.filter(p => (p.pr_number || p.pr) !== pr);
        state.failed.unshift({
          thread_id: event.thread_id, pr_number: pr, error: event.error,
          processed_at: new Date().toISOString(), status: 'failed',
        });
        render();

      } else if (t === 'cycle_end') {
        document.getElementById('cycle-badge').textContent =
          `Cycle done: ${event.fixed || 0} fixed, ${event.failed || 0} failed`;
        state.inProgress = [];
        render();

      } else if (t === 'no_comments') {
        document.getElementById('cycle-badge').textContent = 'No @HS-prism-bot comments';
      }
    }

    // ── Init ──
    loadState();
    connectSSE();
    setInterval(loadState, 30000);
  </script>
</body>
</html>
