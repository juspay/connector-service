name: Release a stable SDK version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type (semver)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      ref:
        description: "Tag or branch to release from (e.g. 2026.05.07.0 or main)"
        required: false
        default: "main"
        type: string
      dry_run:
        description: "Dry run — preview version and changelog without committing or publishing"
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  create-semver-tag:
    name: Tag and create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Check if user is authorized to trigger workflow
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CONNECTOR_SERVICE_CI_PAT }}
        run: |
          function is_user_team_member() {
            local username="${1}"
            local team_slug="${2}"
            local org_name="juspay"

            status_code="$(
              curl \
                --location \
                --silent \
                --output /dev/null \
                --write-out '%{http_code}' \
                --header 'Accept: application/vnd.github+json' \
                --header 'X-GitHub-Api-Version: 2022-11-28' \
                --header "Authorization: Bearer ${GH_TOKEN}" \
                "https://api.github.com/orgs/${org_name}/teams/${team_slug}/memberships/${username}"
            )"
            [[ status_code -eq 200 ]]
          }

          allowed_teams=('connector-service-admins' 'connector-service-maintainers')
          is_user_authorized=false
          username=${{ github.triggering_actor }}

          for team in "${allowed_teams[@]}"; do
            if is_user_team_member "${username}" "${team}"; then
              is_user_authorized=true
              break
            fi
          done

          if ${is_user_authorized}; then
            echo "${username} is authorized to trigger workflow"
          else
            printf -v allowed_teams_comma_separated '%s, ' "${allowed_teams[@]}"
            echo "::error::${username} is not authorized to trigger workflow; must be a member of one of these teams: ${allowed_teams_comma_separated%, }"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          token: ${{ secrets.CONNECTOR_SERVICE_CI_PAT }}

      - name: Install cocogitto
        uses: taiki-e/install-action@v2
        with:
          tool: cocogitto@6.3.0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Compute next version
        id: version
        shell: bash
        run: |
          PREVIOUS_TAG="$(cog get-version 2>/dev/null || git describe --tags --match 'v[0-9]*' --abbrev=0 2>/dev/null || echo 'v0.0.0')"
          PREVIOUS_TAG="v${PREVIOUS_TAG#v}"

          NEXT_TAG="$(cog bump --dry-run "--${{ inputs.bump_type }}" 2>/dev/null)"

          if [ -z "$NEXT_TAG" ]; then
            CURRENT="${PREVIOUS_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "${{ inputs.bump_type }}" in
              major) NEXT_TAG="v$((MAJOR+1)).0.0" ;;
              minor) NEXT_TAG="v${MAJOR}.$((MINOR+1)).0" ;;
              patch) NEXT_TAG="v${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
          fi

          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${NEXT_TAG}"         >> "$GITHUB_OUTPUT"

          echo "### Version Bump Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "| | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| bump_type | \`${{ inputs.bump_type }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ref       | \`${{ inputs.ref }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| previous  | \`${PREVIOUS_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| next      | \`${NEXT_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| dry_run   | \`${{ inputs.dry_run }}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate release notes
        id: changelog
        shell: bash
        run: |
          PREVIOUS_TAG="${{ steps.version.outputs.previous_tag }}"
          NEXT_TAG="${{ steps.version.outputs.next_tag }}"

          export GIT_CLIFF__GIT__TAG_PATTERN='v[0-9]*\.[0-9]*\.[0-9]*'

          git-cliff \
            --config '.github/git-cliff-changelog.toml' \
            --strip header \
            --tag "${NEXT_TAG}" \
            "${PREVIOUS_TAG}^.." \
            | sed "/## ${PREVIOUS_TAG}\$/,\$d" > release-notes.md

          echo "notes_file=release-notes.md" >> "$GITHUB_OUTPUT"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Release Notes Preview" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          head -60 release-notes.md >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Create and push SemVer tag
        if: ${{ inputs.dry_run == false }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CONNECTOR_SERVICE_CI_PAT }}
        run: |
          NEXT_TAG="${{ steps.version.outputs.next_tag }}"

          gh api \
            --method POST \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            '/repos/{owner}/{repo}/git/refs' \
            --raw-field "ref=refs/tags/${NEXT_TAG}" \
            --raw-field "sha=${{ github.sha }}"

      - name: Update latest tag
        if: ${{ inputs.dry_run == false }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CONNECTOR_SERVICE_CI_PAT }}
        run: |
          gh api \
            --method POST \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            '/repos/{owner}/{repo}/git/refs' \
            --raw-field "ref=refs/tags/latest" \
            --raw-field "sha=${{ github.sha }}" \
          || \
          gh api \
            --method PATCH \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            '/repos/{owner}/{repo}/git/refs/tags/latest' \
            --raw-field "sha=${{ github.sha }}" \
            --field force=true

      - name: Create GitHub release
        if: ${{ inputs.dry_run == false }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CONNECTOR_SERVICE_CI_PAT }}
        run: |
          NEXT_TAG="${{ steps.version.outputs.next_tag }}"

          gh release create "${NEXT_TAG}" \
            --title "${NEXT_TAG}" \
            --notes-file release-notes.md \
            --latest

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
