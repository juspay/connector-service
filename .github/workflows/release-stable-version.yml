name: Release a stable version

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — preview version and changelog without publishing"
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  tag-release:
    name: Bump version, tag, and generate changelog
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      version: ${{ steps.version.outputs.version }}
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      next_tag: ${{ steps.version.outputs.next_tag }}

    steps:
      - name: Validate CalVer tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?(-[a-zA-Z0-9._-]+)?$ ]]; then
            echo "Valid CalVer tag: ${{ github.ref_name }}"
          else
            echo "::error::${{ github.ref_name }} is not a valid CalVer tag (expected YYYY.MM.DD.N or YYYY.MM.DD.N-suffix)"
            exit 1
          fi

      - name: Check if user is authorized to trigger workflow
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CONNECTOR_SERVICE_CI_PAT }}
        run: |
          function is_user_team_member() {
            local username="${1}"
            local team_slug="${2}"
            local org_name="juspay"
            status_code="$(
              curl \
                --location \
                --silent \
                --output /dev/null \
                --write-out '%{http_code}' \
                --header 'Accept: application/vnd.github+json' \
                --header 'X-GitHub-Api-Version: 2022-11-28' \
                --header "Authorization: Bearer ${GH_TOKEN}" \
                "https://api.github.com/orgs/${org_name}/teams/${team_slug}/memberships/${username}"
            )"
            [[ status_code -eq 200 ]]
          }

          allowed_teams=('connector-service-admins' 'connector-service-maintainers')
          is_user_authorized=false
          username=${{ github.triggering_actor }}

          for team in "${allowed_teams[@]}"; do
            if is_user_team_member "${username}" "${team}"; then
              is_user_authorized=true
              break
            fi
          done

          if ${is_user_authorized}; then
            echo "${username} is authorized to trigger workflow"
          else
            printf -v allowed_teams_comma_separated '%s, ' "${allowed_teams[@]}"
            echo "::error::${username} is not authorized to trigger workflow; must be a member of one of these teams: ${allowed_teams_comma_separated%, }"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CONNECTOR_SERVICE_CI_PAT }}

      - name: Install cocogitto
        uses: taiki-e/install-action@v2
        with:
          tool: cocogitto@6.3.0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Compute next version
        id: version
        shell: bash
        run: |
          PREVIOUS_TAG="$(cog get-version 2>/dev/null || echo '0.0.0')"
          PREVIOUS_TAG="v${PREVIOUS_TAG#v}"

          NEXT_TAG="$(cog bump --dry-run --auto --skip-untracked 2>/dev/null)"
          NEXT_TAG="v${NEXT_TAG#v}"

          if [ -z "${NEXT_TAG#v}" ]; then
            echo "::error::cog bump --auto produced no version. Check that commits follow conventional format."
            exit 1
          fi

          VERSION="${NEXT_TAG#v}"

          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${NEXT_TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"           >> "$GITHUB_OUTPUT"

          echo "### Version Bump Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "| | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| calver_tag | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| previous   | \`${PREVIOUS_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| next       | \`${NEXT_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| dry_run    | \`${{ inputs.dry_run }}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate release notes
        id: changelog
        shell: bash
        run: |
          PREVIOUS_TAG="${{ steps.version.outputs.previous_tag }}"
          NEXT_TAG="${{ steps.version.outputs.next_tag }}"

          export GIT_CLIFF__GIT__TAG_PATTERN='^v[0-9]+\.[0-9]+\.[0-9]+$'

          if git rev-parse "${PREVIOUS_TAG}" >/dev/null 2>&1; then
            git-cliff \
              --config '.github/git-cliff-changelog.toml' \
              --strip all \
              --tag "${NEXT_TAG}" \
              "${PREVIOUS_TAG}..HEAD" > release-notes.md
          else
            git-cliff \
              --config '.github/git-cliff-changelog.toml' \
              --strip all \
              --tag "${NEXT_TAG}" > release-notes.md
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Release Notes Preview" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          head -60 release-notes.md >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

      - name: Create SemVer tag on CalVer SHA
        if: ${{ inputs.dry_run == false }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CONNECTOR_SERVICE_CI_PAT }}
        run: |
          gh api \
            --method POST \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            '/repos/{owner}/{repo}/git/refs' \
            --raw-field "ref=refs/tags/${{ steps.version.outputs.next_tag }}" \
            --raw-field "sha=${{ github.sha }}"

      - name: Create GitHub release (draft)
        if: ${{ inputs.dry_run == false }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CONNECTOR_SERVICE_CI_PAT }}
        run: |
          gh release create "${{ steps.version.outputs.next_tag }}" \
            --title "${{ steps.version.outputs.next_tag }}" \
            --notes-file release-notes.md \
            --draft


  publish-sdks:
    name: Publish SDKs
    needs: [tag-release]
    if: ${{ inputs.dry_run == false }}
    uses: ./.github/workflows/release-sdks.yml
    with:
      publish_java: true
      publish_python: true
      publish_javascript: true
      preview_only: false
      ref: ${{ needs.tag-release.outputs.next_tag }}
      version: ${{ needs.tag-release.outputs.version }}
    secrets:
      CONNECTOR_SERVICE_CI_PAT: ${{ secrets.CONNECTOR_SERVICE_CI_PAT }}
      CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
      CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
      GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
      GPG_SIGNING_KEY_PASSWORD: ${{ secrets.GPG_SIGNING_KEY_PASSWORD }}
      PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
