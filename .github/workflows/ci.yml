name: CI

on:
  push:
    branches:
      - main
  pull_request:

  merge_group:
    types:
      - checks_requested

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
# Job dependency graph:
#
#   changes ─┬─ typos           (always, ~8s)
#            ├─ formatting      (if *.rs changed, ~18s)
#            │   ├─ check       (if rust changed, ~11min — clippy + schema)
#            │   │   └─ test    (if rust changed, ~3min — reuses check cache)
#            │   └─ sdk-test    (if sdk/rust-core/proto changed, ~11min)
#            └─ docs-update     (if connector/docs code changed, PR only, ~9min)
#            └─ ci-gate         (always — single required status check)
#
# Key optimization: `test` runs AFTER `check` and shares its compilation
# cache via shared-key. Since test compilation is 13min and test execution
# is only 1.2min, reusing check's cache cuts test from 14min to ~3min.
# For connector-only PRs, sdk-test is skipped entirely.
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Change Detection ──────────────────────────────────────────────────────
  # Determines which file groups changed so downstream jobs can be skipped.
  # On push-to-main, dorny/paths-filter compares against the previous commit,
  # so only affected jobs run even on merge.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      rust-core: ${{ steps.filter.outputs.rust-core }}
      connector: ${{ steps.filter.outputs.connector }}
      any-rust: ${{ steps.filter.outputs.any-rust }}
      sdk: ${{ steps.filter.outputs.sdk }}
      proto: ${{ steps.filter.outputs.proto }}
      docs-trigger: ${{ steps.filter.outputs.docs-trigger }}
      any-rs: ${{ steps.filter.outputs.any-rs }}
      ci: ${{ steps.filter.outputs.ci }}
      connector-names: ${{ steps.connector-names.outputs.list }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need full history for accurate diff on push events
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: json
          filters: |
            rust-core:
              - 'crates/common/**'
              - 'crates/types-traits/**'
              - 'crates/grpc-server/**'
              - 'crates/ffi/**'
              - 'crates/internal/composite-service/**'
              - 'crates/internal/field-probe/**'
              - 'crates/internal/uniffi-bindgen/**'
              - 'crates/internal/integration-tests/src/harness/**'
              - 'crates/internal/integration-tests/src/global_suites/**'
              - 'crates/internal/integration-tests/src/lib.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
            connector:
              - 'crates/integrations/**'
              - 'crates/internal/integration-tests/src/connector_specs/**'
            any-rust:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            sdk:
              - 'sdk/**'
              - 'crates/ffi/**'
            proto:
              - 'crates/types-traits/grpc-api-types/proto/**'
            docs-trigger:
              - 'crates/integrations/**'
              - 'crates/types-traits/**'
              - 'crates/internal/field-probe/**'
              - 'data/field_probe/**'
              - 'docs/**'
              - 'docs-generated/**'
              - 'examples/**'
              - 'scripts/**'
            any-rs:
              - '**/*.rs'
            ci:
              - '.github/**'

      - name: Extract changed connector names
        id: connector-names
        if: steps.filter.outputs.connector == 'true'
        shell: bash
        run: |
          names=$(echo '${{ steps.filter.outputs.connector_files }}' | \
            jq -r '.[]' | \
            grep -oE '(connectors|connector_specs)/[^/]+' | \
            sed 's|^connectors/||;s|^connector_specs/||' | \
            sort -u | paste -sd ',' -)
          echo "list=$names" >> $GITHUB_OUTPUT
          echo "Changed connectors: $names"

  # ── Fast Checks ───────────────────────────────────────────────────────────

  typos:
    name: Spell check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Spell check
        uses: crate-ci/typos@master
        with:
          config: ./.typos.toml

  formatting:
    name: Check formatting
    needs: changes
    # Only check formatting when Rust source files or CI config changed
    if: needs.changes.outputs.any-rs == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt

      - name: Check formatting
        shell: bash
        run: cargo +nightly fmt --all --check

  # ── Compilation & Lint ────────────────────────────────────────────────────

  check:
    name: Compilation Check
    needs: [changes, formatting]
    # Run if rust/proto/CI files changed AND formatting didn't fail.
    # 'always()' is needed because `formatting` may be skipped (no .rs changes)
    # and skipped dependencies cause downstream jobs to be skipped by default.
    if: >-
      always() &&
      needs.formatting.result != 'failure' &&
      (needs.changes.outputs.any-rust == 'true' ||
       needs.changes.outputs.proto == 'true' ||
       needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest

    env:
      RUSTFLAGS: "-D warnings"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # NOTE: Nightly Rust removed — this job only runs clippy (stable).
      # Formatting is handled by the dedicated `formatting` job.
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2.7.8
        with:
          shared-key: "ci-rust-${{ runner.os }}"

      - name: Run Clippy
        run: cargo +stable clippy --all-features --all-targets

      - name: Run Composite Request Schema Checks
        run: cargo test -p composite-service --test composite_request_schema_check

      - name: Run UCS Connector Schema Compatibility Check
        run: cargo test -p integration-tests --lib harness::scenario_api::tests::all_supported_scenarios_match_proto_schema_for_all_connectors -- --exact

      - name: Run Connector Specs Coverage Check
        run: cargo run --bin check_connector_specs

  # ── Tests ─────────────────────────────────────────────────────────────────

  test:
    name: Run Tests
    needs: [changes, formatting, check]
    # Runs AFTER check to reuse its compilation cache (shared-key).
    # Test compilation is 13min vs 1.2min test execution — cache reuse is critical.
    # With warm cache from check: ~3min instead of ~14min.
    if: >-
      always() &&
      needs.formatting.result != 'failure' &&
      needs.check.result == 'success' &&
      (needs.changes.outputs.any-rust == 'true' ||
       needs.changes.outputs.proto == 'true' ||
       needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest

    env:
      RUSTFLAGS: "-D warnings"
      RUN_TESTS: ${{ (github.event_name == 'push') || ((github.event_name == 'pull_request') && (github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name)) || (github.event_name == 'merge_group') }}

    steps:
      - name: Skip tests for PRs from forks
        if: ${{ env.RUN_TESTS == 'false' }}
        shell: bash
        run: echo 'Skipping tests for PRs from forks'

      - name: Checkout code
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: actions/checkout@v4

      - name: Install Rust
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Protoc
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2.7.8
        if: ${{ env.RUN_TESTS == 'true' }}
        with:
          cache-on-failure: true
          shared-key: "ci-rust-${{ runner.os }}"

      - name: Install nextest
        if: ${{ env.RUN_TESTS == 'true' }}
        uses: taiki-e/install-action@v2
        with:
          tool: nextest
          checksum: true

      - name: Download Encrypted Connector Credentials from S3 and Decrypt
        if: ${{ env.RUN_TESTS == 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CONNECTOR_CREDS_AWS_ACCESS_KEY_ID }}
          AWS_REGION: ${{ secrets.CONNECTOR_CREDS_AWS_REGION }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CONNECTOR_CREDS_AWS_SECRET_ACCESS_KEY }}
          CONNECTOR_AUTH_PASSPHRASE: ${{ secrets.CONNECTOR_AUTH_PASSPHRASE }}
          CONNECTOR_CREDS_S3_BUCKET_URI: ${{ secrets.CONNECTOR_CREDS_S3_BUCKET_URI}}
          DESTINATION_FILE_NAME: "creds.json.gpg"
          S3_SOURCE_FILE_NAME: "b59e91fc-9054-4412-a746-664fdc185345.json.gpg"
        shell: bash
        run: |
          mkdir -p ".github/secrets" ".github/test"

          aws s3 cp "${CONNECTOR_CREDS_S3_BUCKET_URI}/${S3_SOURCE_FILE_NAME}" ".github/secrets/${DESTINATION_FILE_NAME}"
          gpg --quiet --batch --yes --decrypt --passphrase="${CONNECTOR_AUTH_PASSPHRASE}" --output ".github/test/creds.json" ".github/secrets/${DESTINATION_FILE_NAME}"

      - name: Set connector credentials path in environment
        if: ${{ env.RUN_TESTS == 'true' }}
        shell: bash
        run: |
          # Only set the environment variable if the credentials file exists
          if [[ -f ".github/test/creds.json" ]]; then
            echo "CONNECTOR_AUTH_FILE_PATH=${{ github.workspace }}/.github/test/creds.json" >> $GITHUB_ENV
            echo "Connector credentials available for tests"
          else
            echo "No connector credentials available - tests will use default values"
          fi

      - name: Run Tests
        if: ${{ env.RUN_TESTS == 'true' }}
        shell: bash
        # Schema tests excluded — already run in `check` job.
        # Connector-only PRs: scope tests to changed connectors for faster feedback.
        run: |
          CONNECTOR_NAMES="${{ needs.changes.outputs.connector-names }}"
          CORE_CHANGED="${{ needs.changes.outputs.rust-core }}"
          PROTO_CHANGED="${{ needs.changes.outputs.proto }}"
          CI_CHANGED="${{ needs.changes.outputs.ci }}"

          EXCLUDE='-E not test(=all_supported_scenarios_match_proto_schema_for_all_connectors)'

          if [[ -n "$CONNECTOR_NAMES" && "$CORE_CHANGED" != "true" && "$PROTO_CHANGED" != "true" && "$CI_CHANGED" != "true" ]]; then
            # Connector-only PR: scope tests to changed connectors
            FILTER=""
            IFS=',' read -ra CONNECTORS <<< "$CONNECTOR_NAMES"
            for c in "${CONNECTORS[@]}"; do
              [[ -n "$FILTER" ]] && FILTER="$FILTER | "
              FILTER="${FILTER}test(/${c}/)"
            done
            echo "🔍 Connector-only PR — scoping tests to: $CONNECTOR_NAMES"
            cargo nextest run \
              --config-file .nextest.toml \
              --profile ci \
              -E "($FILTER) & $EXCLUDE"
          else
            echo "🔍 Core change detected — running full test suite"
            cargo nextest run \
              --config-file .nextest.toml \
              --profile ci \
              -E "$EXCLUDE"
          fi

  # ── SDK Tests ─────────────────────────────────────────────────────────────

  sdk-test:
    name: SDK Tests
    needs: [changes, formatting]
    # Run when SDK, core Rust (not just connectors), proto, or CI files changed.
    # SDK depends on FFI which depends on core crates, but NOT on individual
    # connector implementations. Connector-only PRs skip this entirely.
    if: >-
      always() &&
      needs.formatting.result != 'failure' &&
      (needs.changes.outputs.sdk == 'true' ||
       needs.changes.outputs.rust-core == 'true' ||
       needs.changes.outputs.proto == 'true' ||
       needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest

    env:
      RUSTFLAGS: "-D warnings"
      PROFILE: dev  # Use debug profile instead of release (5x faster compilation)
      # CI should use CARGO_INCREMENTAL=0 for smaller, more cacheable artifacts.
      # Swatinem/rust-cache docs recommend 0 for CI (better cache hit rate).
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            sdk/javascript/package-lock.json
            sdk/tests/package.json

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('sdk/python/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - uses: Swatinem/rust-cache@v2.7.8
        with:
          cache-on-failure: true
          key: sdk-test-${{ runner.os }}

      - name: Cache FFI library
        uses: actions/cache@v4
        with:
          path: |
            target/*/*/libconnector_service_ffi.so
            target/*/*/libconnector_service_ffi.dylib
          key: ffi-lib-${{ runner.os }}-${{ hashFiles('crates/ffi/**/*.rs', 'crates/ffi/**/Cargo.toml', 'Cargo.lock') }}
          restore-keys: |
            ffi-lib-${{ runner.os }}-

      - name: Install Python codegen dependencies
        run: |
          pip install -r sdk/python/requirements.txt grpcio-tools protobuf
          make -C sdk install-deps

      - name: Install Node dependencies
        run: |
          cd sdk/javascript && npm ci && cd ../..
          cd sdk/tests && npm install && cd ../..

      - name: Create connector credentials for SDK tests
        shell: bash
        env:
          CONNECTOR_SPECIFIC_AUTH: ${{ secrets.CONNECTOR_SPECIFIC_AUTH }}
        run: |
          if [[ -n "${CONNECTOR_SPECIFIC_AUTH}" ]]; then
            echo "${CONNECTOR_SPECIFIC_AUTH}" > creds.json
            echo "Connector credentials created for SDK tests"
          else
            echo "No CONNECTOR_SPECIFIC_AUTH secret found, will run in dry-run mode"
          fi

      - name: Build FFI library once
        run: |
          # Determine target triple (matches PLATFORM detection in common.mk)
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            PLATFORM="aarch64-unknown-linux-gnu"
          else
            PLATFORM="x86_64-unknown-linux-gnu"
          fi
          # PROFILE=dev maps to 'debug' output directory in Cargo
          PROFILE_DIR="debug"
          LIB_PATH="target/${PLATFORM}/${PROFILE_DIR}/libconnector_service_ffi.so"
          if [ ! -f "$LIB_PATH" ]; then
            echo "Building FFI library (cache miss)..."
            cargo build -p ffi --no-default-features --features uniffi \
              --profile dev --target "$PLATFORM"
          else
            echo "Using cached FFI library: $LIB_PATH"
          fi

      - name: Generate SDK code (flows.json and harnesses)
        shell: bash
        run: make -C sdk generate FFI_SKIP_BUILD=1

      - name: Run SDK Tests
        shell: bash
        run: |
          if [[ -f "creds.json" ]]; then
            echo "Running SDK tests with connector credentials"
          else
            echo "Running SDK tests without connector credentials (dry-run mode)"
          fi
          # Skip FFI rebuild during test - already built above
          # Note: flows.json must be generated before running tests
          make -C sdk test FFI_SKIP_BUILD=1

      - name: Verify SDK code regeneration produces no changes
        shell: bash
        run: make -C sdk generate FFI_SKIP_BUILD=1

      - name: Check for uncommitted changes
        shell: bash
        run: |
          git diff --exit-code || (echo "ERROR: Generated SDK code is out of date. Run 'make -C sdk generate' and commit the changes." && exit 1)

  # ── Docs Update ───────────────────────────────────────────────────────────

  docs-update:
    name: Auto-update Connector Documentation
    needs: changes
    runs-on: ubuntu-latest
    # Only run on PRs when connector/docs files changed, for human authors
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login != 'github-actions[bot]' &&
      (needs.changes.outputs.docs-trigger == 'true' ||
       needs.changes.outputs.ci == 'true')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Checkout the PR branch so we can commit to it
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Rust (nightly for fmt)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2.7.8

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install jinja2 google-cloud-vision python-dotenv requests types-requests grpcio-tools

      - name: Generate documentation
        run: |
          echo "Generating connector documentation..."
          make docs CONNECTORS=all 2>&1 | tail -20

      - name: Format Rust code
        run: |
          echo "Formatting Rust code..."
          cargo +nightly fmt --all

      - name: Check for doc changes
        id: check_doc_changes
        run: |
          if git diff --quiet data/field_probe/ docs-generated/ examples/; then
            echo "No documentation changes detected"
            echo "has_doc_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Documentation changes detected"
            git diff --stat data/field_probe/ docs-generated/ examples/
            echo "has_doc_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push doc changes
        if: steps.check_doc_changes.outputs.has_doc_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/field_probe/ docs-generated/ examples/
          git commit -m "docs: auto-update connector documentation

          Regenerated field probe data, documentation, and examples.
          
          - Updated data/field_probe/*.json
          - Updated docs-generated/
          - Updated examples/ (Python, TypeScript, Kotlin, Rust)
          - Formatted Rust code with cargo +nightly fmt
          
          This commit was automatically generated by GitHub Actions."
          
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          echo "✓ Documentation changes committed to PR #${{ github.event.pull_request.number }}"

  # ── CI Gate ───────────────────────────────────────────────────────────────
  # Single job to use as the required status check in branch protection.
  # Succeeds if all jobs passed or were legitimately skipped (path filtering).
  # Fails if any job failed or was cancelled.
  ci-gate:
    name: CI Result
    if: always()
    needs: [typos, formatting, check, test, sdk-test, docs-update]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate CI results
        run: |
          echo "Job results:"
          echo "  typos:       ${{ needs.typos.result }}"
          echo "  formatting:  ${{ needs.formatting.result }}"
          echo "  check:       ${{ needs.check.result }}"
          echo "  test:        ${{ needs.test.result }}"
          echo "  sdk-test:    ${{ needs.sdk-test.result }}"
          echo "  docs-update: ${{ needs.docs-update.result }}"
          echo ""

          results=(
            "${{ needs.typos.result }}"
            "${{ needs.formatting.result }}"
            "${{ needs.check.result }}"
            "${{ needs.test.result }}"
            "${{ needs.sdk-test.result }}"
            "${{ needs.docs-update.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "❌ CI failed — one or more jobs returned: $result"
              exit 1
            fi
          done
          echo "✅ All CI checks passed (or were skipped due to path filtering)"
