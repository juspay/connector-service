name: Sync Docs to Hyperswitch Docs

on:
  push:
    branches:
      - main
      - docs-summary-update-v2
    paths:
      - 'docs/**'
      - 'docs-generated/**'
      - '.github/workflows/docs-sync.yml'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not push changes)'
        required: false
        default: false
        type: boolean
      source_branch:
        description: 'Source branch to sync from'
        required: false
        default: ''
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync-docs:
    name: Sync Documentation to Hyperswitch Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prism
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_branch || github.ref }}
          fetch-depth: 0

      - name: Checkout hyperswitch-docs
        uses: actions/checkout@v4
        with:
          repository: juspay/hyperswitch-docs
          token: ${{ secrets.CONNECTOR_SERVICE_DOCS_CI }}
          path: hyperswitch-docs

      - name: Sync documentation files
        run: |
          echo "=== Syncing documentation files ==="
          TARGET_DIR="hyperswitch-docs/prism"
          mkdir -p "$TARGET_DIR"

          # Remove old content
          rm -rf "$TARGET_DIR"/*

          # Copy /docs content (excluding patterns from gitbook.yml)
          echo "Copying docs/ content..."
          rsync -a \
            --exclude='rules/' \
            --exclude='rfcs/' \
            --exclude='plans/' \
            --exclude='CODE_OF_CONDUCT.md' \
            --exclude='specs-self-managing-documentation-system.md' \
            --exclude='docs-strategy.md' \
            --exclude='*.yml' \
            --exclude='*.yaml' \
            --exclude='.git/' \
            docs/ "$TARGET_DIR/"

          # Copy /docs-generated content (merges with /docs)
          echo "Copying docs-generated/ content..."
          rsync -a \
            --exclude='.git/' \
            docs-generated/ "$TARGET_DIR/"

          echo "=== Files synced ==="
          echo "Total files in prism/:"
          find "$TARGET_DIR" -type f | wc -l

      - name: Generate SUMMARY.md
        run: |
          echo "=== Generating SUMMARY.md files ==="

          # Path to source SUMMARY.md (in checked out prism repo)
          SOURCE_SUMMARY="docs/SUMMARY.md"
          TARGET_SUMMARY="hyperswitch-docs/prism/SUMMARY.md"

          echo "Source: $SOURCE_SUMMARY"
          echo "Target: $TARGET_SUMMARY"

          # Verify source exists
          if [ ! -f "$SOURCE_SUMMARY" ]; then
            echo "ERROR: Source SUMMARY.md not found at $SOURCE_SUMMARY"
            echo "Current directory: $(pwd)"
            echo "Listing docs/:"
            ls -la docs/ 2>/dev/null || echo "docs/ directory not found"
            exit 1
          fi

          echo "Source SUMMARY.md found. Content preview:"
          head -10 "$SOURCE_SUMMARY"
          echo ""

          # Copy source to target
          cp "$SOURCE_SUMMARY" "$TARGET_SUMMARY"
          echo "Copied $SOURCE_SUMMARY to $TARGET_SUMMARY"

          # Verify the copy worked
          echo "Target file preview:"
          head -10 "$TARGET_SUMMARY"
          echo ""

          # Check for Java SDK section
          if grep -q "Java SDK" "$TARGET_SUMMARY"; then
            echo "✓ Java SDK section found in SUMMARY.md"
          else
            echo "✗ Java SDK section NOT found in SUMMARY.md"
          fi

      - name: Update root SUMMARY.md
        working-directory: hyperswitch-docs
        run: |
          echo "=== Updating root SUMMARY.md ==="

          if [ ! -f "SUMMARY.md" ]; then
            echo "WARNING: Root SUMMARY.md not found"
            exit 0
          fi

          # Remove old PRISM sections
          echo "Removing old PRISM sections..."
          sed -i '/^### PRISM$/,/^\(##\|###\) /{ /^### PRISM$/d; /^\(##\|###\) /!d; }' SUMMARY.md 2>/dev/null || true
          sed -i '/^## PRISM$/,$d' SUMMARY.md 2>/dev/null || true

          # Find Integrations section
          if grep -q "^## Integrations" SUMMARY.md; then
            echo "Found '## Integrations' section"

            # Create temp file with PRISM content
            TEMP_FILE=$(mktemp)
            echo "" >> "$TEMP_FILE"
            echo "### PRISM" >> "$TEMP_FILE"

            # Copy and transform prism/SUMMARY.md
            tail -n +2 prism/SUMMARY.md | \
              sed 's/^#### /###### /g; s/^### /##### /g; s/^## /#### /g; s/^# /### /g; s/](/](prism\//g' >> "$TEMP_FILE"

            # Insert after Integrations section
            sed -i '/^## Integrations$/r '"$TEMP_FILE"'' SUMMARY.md
            rm "$TEMP_FILE"

            echo "✓ Added PRISM under '## Integrations'"
          else
            echo "WARNING: '## Integrations' section not found - adding as top-level"
            echo "" >> SUMMARY.md
            echo "## PRISM" >> SUMMARY.md
            tail -n +2 prism/SUMMARY.md | \
              sed 's/^#### /##### /g; s/^### /#### /g; s/^## /### /g; s/](/](prism\//g' >> SUMMARY.md
          fi

          echo "Root SUMMARY.md updated. PRISM section preview:"
          grep -A 20 "### PRISM\|## PRISM" SUMMARY.md | head -25 || echo "PRISM section not found in output"

      - name: Commit and push changes
        if: ${{ !inputs.dry_run }}
        working-directory: hyperswitch-docs
        run: |
          echo "=== Committing and pushing changes ==="

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add prism/
          git add SUMMARY.md

          # Check for changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          echo "Changes detected:"
          git diff --cached --stat

          git commit -m "docs(prism): sync from hyperswitch-prism@${{ github.sha }}

          Sync documentation from juspay/hyperswitch-prism@${{ github.sha }}
          Branch: ${{ github.ref_name }}

          Changes:
          $(git diff --cached --stat | tail -1)"

          git push origin HEAD:main
          echo "✓ Successfully pushed changes to hyperswitch-docs"

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        working-directory: hyperswitch-docs
        run: |
          echo "## Dry Run Summary"
          echo ""
          echo "Files that would be synced:"
          git add prism/ 2>/dev/null || true
          git diff --staged --stat || echo "No changes detected"
          echo ""
          echo "This was a dry run. No changes were pushed."
