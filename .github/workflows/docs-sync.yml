name: Sync Docs to Hyperswitch Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/docs-sync.yml'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not push changes)'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync-docs:
    name: Sync Documentation to Hyperswitch Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout connector-service
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout hyperswitch-docs
        uses: actions/checkout@v4
        with:
          repository: juspay/hyperswitch-docs
          token: ${{ secrets.CONNECTOR_SERVICE_CI_PAT }}
          path: hyperswitch-docs

      - name: Sync documentation
        run: |
          # Target: hyperswitch-docs/connector-service/
          TARGET_DIR="hyperswitch-docs/connector-service"
          mkdir -p "$TARGET_DIR"

          # Remove old content
          rm -rf "$TARGET_DIR"/*

          # Copy new docs (excluding patterns from gitbook.yml)
          rsync -av \
            --exclude='rules/' \
            --exclude='plans/' \
            --exclude='CODE_OF_CONDUCT.md' \
            --exclude='specs-self-managing-documentation-system.md' \
            --exclude='.git/' \
            docs/ "$TARGET_DIR/"

          echo "Synced files:"
          find "$TARGET_DIR" -type f | head -20

      - name: Commit and push changes
        if: ${{ !inputs.dry_run }}
        working-directory: hyperswitch-docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add connector-service/

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "docs(connector-service): sync from connector-service@${{ github.sha }}

          Sync documentation from juspay/connector-service@${{ github.sha }}

          Changes:
          $(git diff --staged --stat | tail -1)"

          git push origin HEAD:main
          echo "Successfully pushed changes to juspay/hyperswitch-docs"

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        working-directory: hyperswitch-docs
        run: |
          echo "## Dry Run Summary"
          echo ""
          echo "Files that would be synced:"
          git add connector-service/ 2>/dev/null || true
          git diff --staged --stat || echo "No changes detected"
          echo ""
          echo "This was a dry run. No changes were pushed."
