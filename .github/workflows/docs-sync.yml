name: Sync Docs to Hyperswitch Docs

on:
  push:
    branches:
      - main
      - docs-summary-update-v2
    paths:
      - 'docs/**'
      - 'docs-generated/**'
      - '.github/workflows/docs-sync.yml'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not push changes)'
        required: false
        default: false
        type: boolean
      source_branch:
        description: 'Source branch to sync from'
        required: false
        default: ''
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync-docs:
    name: Sync Documentation to Hyperswitch Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prism
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_branch || github.ref }}
          fetch-depth: 0

      - name: Checkout hyperswitch-docs
        uses: actions/checkout@v4
        with:
          repository: juspay/hyperswitch-docs
          token: ${{ secrets.CONNECTOR_SERVICE_DOCS_CI }}
          path: hyperswitch-docs

      - name: Sync documentation
        run: |
          # Target: hyperswitch-docs/prism/
          # This merges /docs and /docs-generated into a unified PRISM section
          TARGET_DIR="hyperswitch-docs/prism"
          mkdir -p "$TARGET_DIR"

          # Remove old content
          rm -rf "$TARGET_DIR"/*

          # Copy /docs content (excluding patterns from gitbook.yml)
          rsync -av \
            --exclude='rules/' \
            --exclude='rfcs/' \
            --exclude='plans/' \
            --exclude='CODE_OF_CONDUCT.md' \
            --exclude='specs-self-managing-documentation-system.md' \
            --exclude='docs-strategy.md' \
            --exclude='*.yml' \
            --exclude='*.yaml' \
            --exclude='.git/' \
            docs/ "$TARGET_DIR/"

          # Copy /docs-generated content (merges with /docs)
          rsync -av \
            --exclude='.git/' \
            docs-generated/ "$TARGET_DIR/"

          echo "Synced files structure:"
          find "$TARGET_DIR" -type d | head -30
          echo ""
          echo "Total files synced:"
          find "$TARGET_DIR" -type f | wc -l

      - name: Generate SUMMARY.md files
        working-directory: hyperswitch-docs
        run: |
          # Debug: Show current directory and file locations
          echo "Current directory: $(pwd)"
          echo "Parent directory contents:"
          ls -la ../
          echo ""
          echo "Checking for docs/SUMMARY.md:"
          ls -la ../docs/SUMMARY.md || echo "NOT FOUND at ../docs/SUMMARY.md"
          
          # Use docs/SUMMARY.md as the source of truth
          if [ ! -f "../docs/SUMMARY.md" ]; then
            echo "ERROR: ../docs/SUMMARY.md not found!"
            echo "Looking for SUMMARY.md in other locations:"
            find .. -name "SUMMARY.md" -type f 2>/dev/null | head -5
            exit 1
          fi

          # Create prism/SUMMARY.md from the source of truth
          # Just copy it as-is since it's already formatted for GitBook
          cp ../docs/SUMMARY.md prism/SUMMARY.md
          echo "Created prism/SUMMARY.md from ../docs/SUMMARY.md"
          echo ""
          echo "prism/SUMMARY.md first 20 lines:"
          head -20 prism/SUMMARY.md

          # Validate that all linked files exist
          echo ""
          echo "Validating linked files..."
          MISSING_FILES=0
          while IFS= read -r line; do
            # Extract markdown links using grep - look for [text](path) patterns
            link_path=$(echo "$line" | grep -oE '\[([^\]]+)\]\(([^)]+)\)' | grep -oE '\([^)]+\)' | tr -d '()' | head -1)
            if [ -n "$link_path" ]; then
              # Skip external links (http/https) and anchors
              case "$link_path" in
                http*|\#*)
                  continue
                  ;;
              esac
              # Remove any anchor suffix
              link_path="${link_path%%#*}"
              # Check if file exists
              if [ ! -f "prism/$link_path" ]; then
                echo "  WARNING: Missing file: $link_path"
                MISSING_FILES=$((MISSING_FILES + 1))
              fi
            fi
          done < prism/SUMMARY.md

          if [ $MISSING_FILES -gt 0 ]; then
            echo ""
            echo "ERROR: $MISSING_FILES file(s) referenced in SUMMARY.md are missing!"
            echo "Please either create the missing files or update docs/SUMMARY.md"
            exit 1
          fi
          echo "All linked files validated successfully!"

          # Update root SUMMARY.md to include PRISM section under "## Integrations"
          if [ -f "SUMMARY.md" ]; then
            # First, remove any existing PRISM section (whether top-level or under Integrations)
            if grep -q "### PRISM" SUMMARY.md; then
              echo "Found existing PRISM subsection - removing it"
              # Remove lines from "### PRISM" until the next ### or ## at same or higher level
              sed -i '/^### PRISM$/,/^\(##\|###\) /{/^### PRISM$/d; /^\(##\|###\) /!d}' SUMMARY.md
            fi
            if grep -q "## PRISM" SUMMARY.md; then
              echo "Found existing top-level PRISM section - removing it"
              sed -i '/^## PRISM$/,$d' SUMMARY.md
            fi

            # Check if "## Integrations" section exists
            if grep -q "^## Integrations" SUMMARY.md; then
              echo "Found '## Integrations' section - adding PRISM under it"
              
              # Create temporary file with PRISM content
              PRISM_TEMP=$(mktemp)
              echo "" >> "$PRISM_TEMP"
              echo "### PRISM" >> "$PRISM_TEMP"
              
              # Copy docs/SUMMARY.md content with adjusted heading levels
              # Original: # PRISM -> ## PRISM, ## Section -> ### Section, etc.
              # After adding under ### PRISM: ## Section -> #### Section
              tail -n +2 ../docs/SUMMARY.md | \
                sed 's/^#### /###### /g; s/^### /##### /g; s/^## /#### /g; s/^# /### /g; s/](/](prism\//g' >> "$PRISM_TEMP"
              
              # Insert PRISM content after "## Integrations" line
              sed -i '/^## Integrations$/r '"$PRISM_TEMP"'' SUMMARY.md
              rm "$PRISM_TEMP"
              
              echo "Added PRISM subsection under '## Integrations'"
            else
              # Fallback: Add PRISM as top-level section if Integrations doesn't exist
              echo "WARNING: '## Integrations' section not found - adding PRISM as top-level section"
              echo "" >> SUMMARY.md
              echo "## PRISM" >> SUMMARY.md
              tail -n +2 ../docs/SUMMARY.md | \
                sed 's/^#### /##### /g; s/^### /#### /g; s/^## /### /g; s/](/](prism\//g' >> SUMMARY.md
              echo "Added PRISM as top-level section"
            fi

            echo ""
            echo "PRISM section preview (first 40 lines):"
            grep -A 40 "### PRISM$" SUMMARY.md | head -40 || grep -A 40 "## PRISM$" SUMMARY.md | head -40
          else
            echo "WARNING: Root SUMMARY.md not found"
          fi

      - name: Commit and push changes
        if: ${{ !inputs.dry_run }}
        working-directory: hyperswitch-docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add prism/
          git add SUMMARY.md

          # Check if there are any staged changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "docs(prism): sync from hyperswitch-prism@${{ github.sha }}

          Sync documentation from juspay/hyperswitch-prism@${{ github.sha }}
          Branch: ${{ github.ref_name }}

          Changes:
          $(git diff --cached --stat | tail -1)"

          git push origin HEAD:main
          echo "Successfully pushed changes to juspay/hyperswitch-docs"

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        working-directory: hyperswitch-docs
        run: |
          echo "## Dry Run Summary"
          echo ""
          echo "Files that would be synced:"
          git add prism/ 2>/dev/null || true
          git diff --staged --stat || echo "No changes detected"
          echo ""
          echo "This was a dry run. No changes were pushed."
